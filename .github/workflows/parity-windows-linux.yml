name: Windows/Linux BC parity

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'BC versions to compare'
        required: false
        default: '27.5,28.1'
        type: string

permissions:
  contents: read
  packages: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        env:
          VERSIONS: ${{ inputs.versions }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          import sys

          versions = [item.strip() for item in os.environ["VERSIONS"].split(",") if item.strip()]
          invalid = [version for version in versions if not re.fullmatch(r"[0-9]+\.[0-9]+", version)]
          if not versions:
              print("No BC versions provided. Use comma-separated major.minor values like 27.5,28.1.", file=sys.stderr)
              sys.exit(1)
          if invalid:
              print(f"Invalid BC version(s): {', '.join(invalid)}. Expected comma-separated major.minor values like 27.5,28.1.", file=sys.stderr)
              sys.exit(1)
          print("matrix=" + json.dumps({"bc_version": versions}))
          PY

  build-smoke-app:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      BC_VERSION: ${{ matrix.bc_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Download BC artifacts
        run: |
          mkdir -p "artifact-cache/$BC_VERSION"
          scripts/download-artifacts.sh onprem "$BC_VERSION" w1 "artifact-cache/$BC_VERSION"
      - name: Install AL compiler and compile smoke app
        run: |
          BC_MAJOR=$(echo "$BC_VERSION" | cut -d. -f1)
          case "$BC_MAJOR" in
            27) AL_TOOL="16.2.28.57946"; RUNTIME="16.0" ;;
            28) AL_TOOL="17.0.34.45391"; RUNTIME="17.0" ;;
            *) echo "Unsupported BC major $BC_MAJOR"; exit 1 ;;
          esac
          export RUNTIME BC_MAJOR
          PKG="microsoft.dynamics.businesscentral.development.tools.linux"
          EXTRACT_DIR="$HOME/.al-tool-cache/$AL_TOOL"
          mkdir -p "$EXTRACT_DIR"
          curl -fsSL "https://api.nuget.org/v3-flatcontainer/${PKG}/${AL_TOOL}/${PKG}.${AL_TOOL}.nupkg" -o "$EXTRACT_DIR/pkg.zip"
          unzip -q -o "$EXTRACT_DIR/pkg.zip" -d "$EXTRACT_DIR"
          rm "$EXTRACT_DIR/pkg.zip"
          AL_TOOL_DIR=$(find "$EXTRACT_DIR" -type f -name alc -printf '%h\n' | sort | tail -1)
          if [ -z "$AL_TOOL_DIR" ]; then
            echo "Could not find alc in $EXTRACT_DIR"
            find "$EXTRACT_DIR" -maxdepth 4 -type f | sort | head -80
            exit 1
          fi
          chmod +x "$AL_TOOL_DIR/alc" 2>/dev/null || true
          printf '#!/usr/bin/env bash\n[ "$1" = compile ] && shift\nexec "%s/alc" "$@"\n' "$AL_TOOL_DIR" > "$HOME/al"
          chmod +x "$HOME/al"
          echo "$HOME" >> "$GITHUB_PATH"
          python3 scripts/stage-symbols.py \
            --artifact-dir "artifact-cache/$BC_VERSION" \
            --app-json extensions/smoke-test/app.json \
            --out-dir extensions/smoke-test/.alpackages
          TEST_RUNNER_APP=$(python3 - <<'PY'
          import sys

          sys.path.insert(0, "scripts")
          from _bcapp import load_artifact_apps  # noqa

          apps = load_artifact_apps(f"artifact-cache/{__import__('os').environ['BC_VERSION']}")
          for info in apps.values():
              if info.get("publisher") == "Microsoft" and info.get("name") == "Test Runner":
                  print(info["path"])
                  break
          else:
              print("Microsoft Test Runner app not found in artifacts", file=sys.stderr)
              sys.exit(1)
          PY
          )
          python3 - <<'PY'
          import os
          import json
          from pathlib import Path
          path = Path("extensions/smoke-test/app.json")
          data = json.loads(path.read_text())
          data["runtime"] = os.environ["RUNTIME"]
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY
          "$HOME/al" compile "/project:extensions/smoke-test" "/packagecachepath:extensions/smoke-test/.alpackages" "/out:smoke-test-$BC_VERSION.app"
          AL_COMPILER="$HOME/al" scripts/build-patched-test-runner.sh \
            --test-runner-app "$TEST_RUNNER_APP" \
            --package-cache extensions/smoke-test/.alpackages \
            --out "patched-test-runner-$BC_VERSION.app"
          rm -rf extensions/TestRunnerExtension/.alpackages
          python3 scripts/stage-symbols.py \
            --artifact-dir "artifact-cache/$BC_VERSION" \
            --app-json extensions/TestRunnerExtension/app.json \
            --out-dir extensions/TestRunnerExtension/.alpackages
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("extensions/TestRunnerExtension/app.json")
          data = json.loads(path.read_text())
          data["runtime"] = os.environ["RUNTIME"]
          for dep in data.get("dependencies", []):
              if dep.get("id", "").lower() == "23de40a6-dfe8-4f80-80db-d70f83ce8caf":
                  dep["version"] = f"{os.environ['BC_MAJOR']}.0.0.0"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY
          python3 - <<'PY'
          from pathlib import Path
          import sys

          sys.path.insert(0, "scripts")
          from _bcapp import read_app_info  # noqa

          cache = Path("extensions/TestRunnerExtension/.alpackages")
          test_runner_id = "23de40a6-dfe8-4f80-80db-d70f83ce8caf"
          for path in cache.glob("*.app"):
              info = read_app_info(str(path))
              if info and info.get("id") == test_runner_id:
                  path.unlink()
          PY
          cp "patched-test-runner-$BC_VERSION.app" extensions/TestRunnerExtension/.alpackages/
          "$HOME/al" compile "/project:extensions/TestRunnerExtension" "/packagecachepath:extensions/TestRunnerExtension/.alpackages" "/out:test-runner-extension-$BC_VERSION.app"
          AUTOMATION_API_V2_APP_ID=10cb69d9-bc8a-4d27-970a-9e110e9db2a5
          python3 scripts/resolve-keep-app-ids.py \
            --artifact-dir "artifact-cache/$BC_VERSION" \
            --app-json extensions/smoke-test/app.json \
            --app-json extensions/TestRunnerExtension/app.json \
            --app-file "patched-test-runner-$BC_VERSION.app" \
            --app-file "test-runner-extension-$BC_VERSION.app" \
            --extra-ids "$AUTOMATION_API_V2_APP_ID" \
            > "keep-app-ids-$BC_VERSION.txt"
          python3 - <<'PY'
          import os
          from pathlib import Path

          # Do not preserve the stock Microsoft Test Runner. The Linux
          # contract publishes a patched Test Runner that grants the custom
          # runner extension access to Microsoft test internals.
          path = Path(f"keep-app-ids-{os.environ['BC_VERSION']}.txt")
          test_runner_id = "23de40a6-dfe8-4f80-80db-d70f83ce8caf"
          ids = {item.strip().lower() for item in path.read_text().split(",") if item.strip()}
          ids.discard(test_runner_id)
          path.write_text(",".join(sorted(ids)) + "\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: smoke-app-${{ matrix.bc_version }}
          path: |
            smoke-test-${{ matrix.bc_version }}.app
            patched-test-runner-${{ matrix.bc_version }}.app
            test-runner-extension-${{ matrix.bc_version }}.app
            keep-app-ids-${{ matrix.bc_version }}.txt

  linux-contract:
    needs: [prepare, build-smoke-app]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      BC_VERSION: ${{ matrix.bc_version }}
      BC_COUNTRY: w1
      BC_TYPE: onprem
      BC_USERNAME: admin
      BC_PASSWORD: admin
      BC_CLEAR_ALL_APPS: selective
      BC_INCLUDE_TEST_TOOLKIT: 'false'
      BC_MEMORY_LIMIT: 12G
      MSSQL_MEMORY_LIMIT_MB: 1024
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: smoke-app-${{ matrix.bc_version }}
          path: build
      - name: Load Linux keep app ids
        run: |
          KEEP_IDS=$(tr -d '\r\n' < "build/keep-app-ids-$BC_VERSION.txt")
          if [ -z "$KEEP_IDS" ]; then
            echo "Computed keep app id list is empty"
            exit 1
          fi
          echo "BC_KEEP_APP_IDS=$KEEP_IDS" >> "$GITHUB_ENV"
          echo "Computed $(printf '%s' "$KEEP_IDS" | tr ',' '\n' | wc -l) keep app id(s)"
      - name: Start Linux BC
        run: |
          free -h
          echo "BC_CLEAR_ALL_APPS=$BC_CLEAR_ALL_APPS"
          echo "BC_KEEP_APP_IDS=$BC_KEEP_APP_IDS"
          echo "BC_INCLUDE_TEST_TOOLKIT=$BC_INCLUDE_TEST_TOOLKIT"
          echo "BC_MEMORY_LIMIT=$BC_MEMORY_LIMIT"
          echo "MSSQL_MEMORY_LIMIT_MB=$MSSQL_MEMORY_LIMIT_MB"
          docker compose up -d
          scripts/wait-for-bc-healthy.sh 45
      - name: Collect Linux contract
        run: |
          parity/collect-linux-contract.sh \
            "build/smoke-test-$BC_VERSION.app" \
            "$BC_VERSION" \
            "contracts/linux-$BC_VERSION.json" \
            "build/patched-test-runner-$BC_VERSION.app" \
            "build/test-runner-extension-$BC_VERSION.app"
      - name: Capture Linux diagnostics
        if: failure()
        run: |
          mkdir -p diagnostics/linux
          free -h > diagnostics/linux/free.txt 2>&1 || true
          docker version > diagnostics/linux/docker-version.txt 2>&1 || true
          docker compose ps > diagnostics/linux/compose-ps.txt 2>&1 || true
          docker stats --no-stream > diagnostics/linux/docker-stats.txt 2>&1 || true
          docker inspect "$(docker compose ps -q bc)" > diagnostics/linux/bc-inspect.json 2>&1 || true
          docker compose logs --no-color > diagnostics/linux/compose.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-linux-${{ matrix.bc_version }}
          path: contracts/linux-${{ matrix.bc_version }}.json
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diagnostics-linux-${{ matrix.bc_version }}
          path: diagnostics/linux/**
          if-no-files-found: ignore

  windows-contract:
    needs: [prepare, build-smoke-app]
    runs-on: windows-2022
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      BC_VERSION: ${{ matrix.bc_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: smoke-app-${{ matrix.bc_version }}
          path: build
      - name: Collect Windows contract
        shell: pwsh
        run: |
          .\parity\collect-windows-contract.ps1 -BcVersion "$env:BC_VERSION" -SmokeAppPath "$PWD\build\smoke-test-$env:BC_VERSION.app" -OutJson "$PWD\contracts\windows-$env:BC_VERSION.json"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-windows-${{ matrix.bc_version }}
          path: contracts/windows-${{ matrix.bc_version }}.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diagnostics-windows-${{ matrix.bc_version }}
          path: |
            contracts\**
            ${{ runner.temp }}\*.log
            ${{ runner.temp }}\*.xml
          if-no-files-found: ignore

  compare-contracts:
    needs: [prepare, linux-contract, windows-contract]
    if: ${{ needs.prepare.result == 'success' && needs.linux-contract.result == 'success' && needs.windows-contract.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      BC_VERSION: ${{ matrix.bc_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: contract-linux-${{ matrix.bc_version }}
          path: contracts
      - uses: actions/download-artifact@v4
        with:
          name: contract-windows-${{ matrix.bc_version }}
          path: contracts
      - name: Compare contracts
        run: |
          python3 parity/compare_contracts.py \
            --linux "contracts/linux-$BC_VERSION.json" \
            --windows "contracts/windows-$BC_VERSION.json" \
            --known-deltas parity/known-deltas.json
