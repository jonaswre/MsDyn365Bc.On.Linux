name: Test BC Versions

# Matrix-tests every supported BC version end-to-end against a real
# test extension (extensions/smoke-test/) by reusing the canonical
# bc-test-from-source.yml workflow. There used to be ~150 lines of
# inline compile/publish/test logic in this file that duplicated
# (and silently broke) features the reusable workflow already provides:
#  - start-do-wait parallelism (BC boots while AL compile runs)
#  - 422-body-inspecting publish helper
#  - shared wait-for-bc-healthy script
#  - hard fail when TESTS_TOTAL is 0
# After the bc-copilot-blueprint debugging session uncovered all of those,
# the cleanest fix was to just use the reusable workflow here too.

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'BC 28 versions to test (comma-separated, e.g. "28.1,28.2")'
        required: false
        default: '28.0,28.1,28.2'
        type: string
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  # Needed to pull runner_image from GHCR in reusable workflow/test jobs.
  packages: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      alcops_url: ${{ steps.alcops.outputs.url }}
    steps:
    - id: set
      run: |
        VERSIONS='${{ inputs.versions }}'
        if [ -z "$VERSIONS" ]; then
          # Default matrix when triggered by push/PR (no workflow_dispatch input).
          # Keep in sync with the workflow_dispatch input default above.
          VERSIONS="28.0,28.1,28.2"
        fi
        export VERSIONS
        python3 - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import os
        import re
        import sys

        versions = [item.strip() for item in os.environ["VERSIONS"].split(",") if item.strip()]
        invalid = [version for version in versions if not re.fullmatch(r"[0-9]+(?:\.[0-9]+){1,3}|latest", version)]
        unsupported = [version for version in versions if version != "latest" and not version.startswith("28.")]
        if not versions:
            print("No BC versions provided. Use comma-separated BC 28 values like 28.1,28.2.", file=sys.stderr)
            sys.exit(1)
        if invalid:
            print(f"Invalid BC version(s): {', '.join(invalid)}. Expected BC 28 values like 28.1,28.2 or latest.", file=sys.stderr)
            sys.exit(1)
        if unsupported:
            print(f"Unsupported BC version(s): {', '.join(unsupported)}. This workflow supports BC 28 only.", file=sys.stderr)
            sys.exit(1)
        print("matrix=" + json.dumps({"bc_version": versions}))
        PY

    - id: alcops
      # Resolve the latest ALCops.Analyzers nupkg URL via the GitHub API.
      # ALCops bakes the version into the asset filename, so the static
      # /releases/latest/download/<file> redirect doesn't work for them
      # — we have to read the release JSON. This intentionally pulls
      # 'latest' on every run so the matrix catches any regression
      # introduced by an ALCops release that breaks Linux .NET 8 loading.
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        URL=$(gh api repos/ALCops/Analyzers/releases/latest \
          --jq '.assets[] | select(.name | endswith(".nupkg")) | .browser_download_url' \
          | head -1)
        if [ -z "$URL" ]; then
          echo "ERROR: could not resolve latest ALCops nupkg URL" >&2
          exit 1
        fi
        echo "Resolved latest ALCops: $URL"
        echo "url=$URL" >> $GITHUB_OUTPUT

  build-image:
    # Build the bc-runner image from THIS commit as a compile/smoke check,
    # but never push it from this workflow. test-versions consumes an existing
    # repository image tag for runtime execution.
    runs-on: ubuntu-latest
    outputs:
      runner_image: ${{ steps.select-image.outputs.runner_image }}
    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build BC runner image (no push)
      uses: docker/build-push-action@v6
      with:
        context: .
        file: src/Dockerfile
        push: false
        # Keep build acceleration without requiring registry push rights.
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - id: select-image
      name: Select runner image reference
      # The build job verifies the current commit still builds successfully.
      # The matrix/container test jobs intentionally run against the latest
      # published runner image because this workflow does not push.
      run: echo "runner_image=${{ env.IMAGE }}:latest" >> "$GITHUB_OUTPUT"

  # ─── Matrix validation: each BC version runs through the canonical
  #     reusable workflow with the smoke test extension. The reusable workflow
  #     handles BC startup parallelism, AL compile, and publish with
  #     422-body-checking.
  test:
    needs: [prepare, build-image]
    name: BC ${{ matrix.bc_version }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/bc-test-from-source.yml
    with:
      bc_version: ${{ matrix.bc_version }}
      bc_country: w1
      bc_type: onprem
      test_app_dirs: extensions/smoke-test
      # Use the selected repository tag from build-image (latest) because
      # test-versions does not publish images.
      runner_image: ${{ needs.build-image.outputs.runner_image }}
      # Pin the runtime scripts checkout to this commit too, so validation
      # at SHA X uses entrypoint.sh / publish-app.sh /
      # wait-for-bc-healthy.sh from SHA X. Without this we'd test the
      # SHA X image with master scripts.
      runtime_ref: ${{ github.sha }}
      # ─── Analyzer load validation ───────────────────────────────────────
      # Every matrix leg compiles the smoke test with all four Microsoft cops
      # PLUS the latest ALCops nupkg PLUS a JSON ruleset that includes
      # StefanMaron/RulesetFiles/base.rulset.json as a remote include. The
      # reusable workflow's compile step greps the AL compiler output for
      # AD0001 / "Could not load" / BadImageFormatException /
      # PlatformNotSupportedException and fails the job if any of those
      # appear — catches "cop DLL silently failed to load on a new BC
      # version" regressions immediately, across the whole support matrix.
      # extensions/smoke-test/cops.rulset.json is runtime-internal and
      # NOT shipped to consumers via the template — they bring their own
      # ruleset and customCodeCops via the workflow inputs.
      enable_code_cop: true
      enable_ui_cop: true
      enable_app_source_cop: true
      enable_per_tenant_extension_cop: true
      custom_code_cops: ${{ needs.prepare.outputs.alcops_url }}
      ruleset_file: "extensions/smoke-test/cops.rulset.json"
      enable_external_rulesets: true
      # Exercise preprocessor_symbols end-to-end on every matrix leg.
      # The smoke test has no #if guards so the symbol is a no-op at the AL
      # level, but it exercises the flag wiring through the workflow and alc.
      preprocessor_symbols: "SMOKE"

  # Exercises the container's own artifact download path (no pre-cached
  # artifacts). Verifies the in-container download feature and lets us
  # measure download speed directly. Runs once (BC 28.1) in parallel
  # with the main matrix. Doesn't fit the reusable workflow pattern
  # because the reusable workflow always pre-downloads artifacts on
  # the host.
  test-container-download:
    needs: [build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Container download test (BC 28.2)

    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Start BC (in-container artifact download)
      # BC_ARTIFACTS_DIR is intentionally NOT set so docker-compose uses a named
      # volume (bc-artifacts) which starts empty — forcing the entrypoint to
      # download artifacts itself. This validates the container download feature.
      env:
        BC_VERSION: "28.2"
        BC_RUNNER_IMAGE: ${{ needs.build-image.outputs.runner_image }}
      run: |
        STEP_START=$(date +%s)
        docker compose up -d 2>&1 | tail -10
        # Use the shared healthcheck script. 30-min budget covers the
        # in-container artifact download (~3 min) + BC boot (~3-5 min).
        ./scripts/wait-for-bc-healthy.sh 30
        ./scripts/verify-network-surface.sh
        echo "TOTAL_DURATION=$(($(date +%s) - STEP_START))" >> $GITHUB_ENV

    - name: Download timing summary
      if: always()
      run: |
        echo "=== In-container artifact download timing ==="
        docker compose logs bc 2>&1 | grep "\[artifacts\]"
        echo ""
        echo "Total start time (download + DB restore + BC startup): ${TOTAL_DURATION:-n/a}s"

  test-no-test-toolkit:
    needs: [build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: No test toolkit startup (BC 28.2)

    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Start BC without test toolkit
      env:
        BC_VERSION: "28.2"
        BC_INCLUDE_TEST_TOOLKIT: "false"
        BC_RUNNER_IMAGE: ${{ needs.build-image.outputs.runner_image }}
      run: |
        docker compose up -d 2>&1 | tail -10
        ./scripts/wait-for-bc-healthy.sh 30
        ./scripts/verify-network-surface.sh
        docker compose logs bc 2>&1 \
          | grep -q "BC_INCLUDE_TEST_TOOLKIT=false: skipped test toolkit publishing"

    - name: BC logs
      if: failure()
      run: docker compose logs bc 2>&1 | tail -200

  test-webclient:
    needs: [build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Web client opt-in (BC 28.2)

    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Start BC with web client
      env:
        BC_VERSION: "28.2"
        BC_WEBCLIENT: "1"
        BC_RUNNER_IMAGE: ${{ needs.build-image.outputs.runner_image }}
      run: |
        docker compose up -d 2>&1 | tail -10
        ./scripts/wait-for-bc-healthy.sh 30
        ./scripts/verify-network-surface.sh
        docker compose logs bc 2>&1 \
          | grep -q "BC_WEBCLIENT=1: starting web client"
        status=$(curl -sS --max-time 10 -o /dev/null -w '%{http_code}' http://localhost:8080 || true)
        case "$status" in
          2*|3*|4*) echo "web client responded with HTTP $status" ;;
          *) echo "ERROR: web client returned HTTP ${status:-000}"; exit 1 ;;
        esac

    - name: BC logs
      if: failure()
      run: docker compose logs bc 2>&1 | tail -200

  # Exercises the macOS compose overlay (docker-compose.macos.yml) on a
  # Linux runner. GitHub-hosted macOS runners cannot run containers at
  # all — Apple's Virtualization framework forbids nested virtualization
  # on the M1/M2 hardware GitHub uses — so the podman/Rosetta side of
  # MacOS.md is untestable in hosted CI. This leg verifies everything
  # else the overlay changes: the 2022-CU17 image tag still exists on
  # MCR, SQL Server boots and restores the demo DB while running as
  # root (user 0:0), and BC comes up healthy on top of that SQL.
  # COMPOSE_FILE makes every docker compose invocation (including the
  # shared wait-for-bc-healthy.sh) apply the overlay consistently.
  test-macos-overlay:
    needs: [build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: macOS overlay test (BC 28.2)
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.macos.yml

    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Validate compose files merge
      run: |
        # Catches YAML/merge errors in the overlay without booting anything,
        # and proves the overlay actually overrides what it claims to.
        MERGED=$(docker compose config)
        echo "$MERGED" | grep -q "mssql/server:2022-CU17-ubuntu-22.04" \
          || { echo "ERROR: overlay did not apply the CU17 SQL image pin"; exit 1; }
        echo "$MERGED" | grep -q 'user: "0:0"' \
          || { echo "ERROR: overlay did not apply user 0:0 on the sql service"; exit 1; }

    - name: Start BC with macOS overlay
      env:
        BC_VERSION: "28.2"
        BC_RUNNER_IMAGE: ${{ needs.build-image.outputs.runner_image }}
      run: |
        docker compose up -d 2>&1 | tail -10
        ./scripts/wait-for-bc-healthy.sh 30

    - name: Verify overlay applied to running stack
      run: |
        SQL_CID=$(docker compose ps -q sql)
        SQL_IMAGE=$(docker inspect --format '{{.Config.Image}}' "$SQL_CID")
        SQL_UID=$(docker compose exec -T sql id -u)
        echo "sql image: $SQL_IMAGE, uid: $SQL_UID"
        [ "$SQL_IMAGE" = "mcr.microsoft.com/mssql/server:2022-CU17-ubuntu-22.04" ] \
          || { echo "ERROR: sql container is not running the CU17 image"; exit 1; }
        [ "$SQL_UID" = "0" ] \
          || { echo "ERROR: sql container is not running as root"; exit 1; }

    - name: SQL log excerpt
      if: failure()
      run: docker compose logs sql 2>&1 | tail -50
