name: Test BC Versions

# Matrix-tests every supported BC version end-to-end against a real
# test extension (extensions/smoke-test/) by reusing the canonical
# bc-test-from-source.yml workflow. There used to be ~150 lines of
# inline compile/publish/test logic in this file that duplicated
# (and silently broke) features the reusable workflow already provides:
#  - start-do-wait parallelism (BC boots while AL compile runs)
#  - 422-body-inspecting publish helper
#  - shared wait-for-bc-healthy script
#  - hard fail when TESTS_TOTAL is 0
# After the bc-copilot-blueprint debugging session uncovered all of those,
# the cleanest fix was to just use the reusable workflow here too.

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'BC versions to test (comma-separated, e.g. "27.0,28.1")'
        required: false
        default: '27.0,27.1,27.2,27.3,27.4,27.5,28.0,28.1'
        type: string
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  # Needed to pull runner_image from GHCR in reusable workflow/test jobs.
  packages: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      alcops_url: ${{ steps.alcops.outputs.url }}
    steps:
    - id: set
      run: |
        VERSIONS='${{ inputs.versions }}'
        if [ -z "$VERSIONS" ]; then
          # Default matrix when triggered by push/PR (no workflow_dispatch input).
          # Keep in sync with the workflow_dispatch input default above.
          VERSIONS="27.0,27.1,27.2,27.3,27.4,27.5,28.0,28.1"
        fi
        JSON=$(echo "$VERSIONS" | python3 -c "import sys,json; print(json.dumps({'bc_version': sys.stdin.read().strip().split(',')}))")
        echo "matrix=$JSON" >> $GITHUB_OUTPUT

    - id: alcops
      # Resolve the latest ALCops.Analyzers nupkg URL via the GitHub API.
      # ALCops bakes the version into the asset filename, so the static
      # /releases/latest/download/<file> redirect doesn't work for them
      # — we have to read the release JSON. This intentionally pulls
      # 'latest' on every run so the matrix catches any regression
      # introduced by an ALCops release that breaks Linux .NET 8 loading.
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        URL=$(gh api repos/ALCops/Analyzers/releases/latest \
          --jq '.assets[] | select(.name | endswith(".nupkg")) | .browser_download_url' \
          | head -1)
        if [ -z "$URL" ]; then
          echo "ERROR: could not resolve latest ALCops nupkg URL" >&2
          exit 1
        fi
        echo "Resolved latest ALCops: $URL"
        echo "url=$URL" >> $GITHUB_OUTPUT

  build-image:
    # Build the bc-runner image from THIS commit as a compile/smoke check,
    # but never push it from this workflow. test-versions consumes an existing
    # repository image tag for runtime execution.
    runs-on: ubuntu-latest
    outputs:
      runner_image: ${{ steps.select-image.outputs.runner_image }}
    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build BC runner image (no push)
      uses: docker/build-push-action@v6
      with:
        context: .
        file: src/Dockerfile
        push: false
        # Keep build acceleration without requiring registry push rights.
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - id: select-image
      name: Select runner image reference
      # The build job verifies the current commit still builds successfully.
      # The matrix/container test jobs intentionally run against the latest
      # published runner image because this workflow does not push.
      run: echo "runner_image=${{ env.IMAGE }}:latest" >> "$GITHUB_OUTPUT"

  # ─── Matrix test: each BC version runs through the canonical reusable
  #     workflow with the smoke test extension. The reusable workflow
  #     handles BC startup parallelism, AL compile, publish (with
  #     422-body-checking), test execution, and TESTS_TOTAL > 0 guard.
  test:
    needs: [prepare, build-image]
    name: BC ${{ matrix.bc_version }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/bc-test-from-source.yml
    with:
      bc_version: ${{ matrix.bc_version }}
      bc_country: w1
      bc_type: sandbox
      test_app_dirs: extensions/smoke-test
      # Pipe form deliberately exercises the multi-range parser end-to-end on
      # the hosted runner so a regression in run-tests.sh's normalization shows
      # up here. Equivalent to the legacy "70000..70001" but covers the new
      # code path. See scripts/run-tests.sh CODEUNIT_RANGE handling.
      codeunit_range: "70000|70001"
      # test_runner is left at its default ("auto"): each leg probes the
      # live server's dev endpoint and uses `al runtests` (the AL dotnet
      # tool's native runner driving the NST's /dev/TestRunnerHub) when
      # Dev API 7.0+ is advertised — BC 28.0+ — falling back to the
      # OData+WebSocket runner on older versions. See
      # scripts/run-tests-altool.py for the altool path's limitations
      # (no AL test runner codeunit, prerelease-only CLI, etc.).
      # Use the selected repository tag from build-image (latest) because
      # test-versions does not publish images.
      runner_image: ${{ needs.build-image.outputs.runner_image }}
      # Pin the bc-linux scripts checkout to this commit too, so a test
      # at SHA X uses entrypoint.sh / run-tests.sh / publish-app.sh /
      # wait-for-bc-healthy.sh from SHA X. Without this we'd test the
      # SHA X image with master scripts.
      bc_linux_ref: ${{ github.sha }}
      # ─── Analyzer load validation ───────────────────────────────────────
      # Every matrix leg compiles the smoke test with all four Microsoft cops
      # PLUS the latest ALCops nupkg PLUS a JSON ruleset that includes
      # StefanMaron/RulesetFiles/base.rulset.json as a remote include. The
      # reusable workflow's compile step greps the AL compiler output for
      # AD0001 / "Could not load" / BadImageFormatException /
      # PlatformNotSupportedException and fails the job if any of those
      # appear — catches "cop DLL silently failed to load on a new BC
      # version" regressions immediately, across the whole support matrix.
      # extensions/smoke-test/cops.rulset.json is bc-linux-internal and
      # NOT shipped to consumers via the template — they bring their own
      # ruleset and customCodeCops via the workflow inputs.
      enable_code_cop: true
      enable_ui_cop: true
      enable_app_source_cop: true
      enable_per_tenant_extension_cop: true
      custom_code_cops: ${{ needs.prepare.outputs.alcops_url }}
      ruleset_file: "extensions/smoke-test/cops.rulset.json"
      enable_external_rulesets: true
      # Exercise preprocessor_symbols end-to-end on every matrix leg.
      # The smoke test has no #if guards so the symbol is a no-op at the AL
      # level, but it exercises the flag wiring through the workflow and alc.
      preprocessor_symbols: "SMOKE"

  # Exercises the container's own artifact download path (no pre-cached
  # artifacts). Verifies the in-container download feature and lets us
  # measure download speed directly. Runs once (BC 27.5) in parallel
  # with the main matrix. Doesn't fit the reusable workflow pattern
  # because the reusable workflow always pre-downloads artifacts on
  # the host.
  test-container-download:
    needs: [build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Container download test (BC 28.1)

    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Start BC (in-container artifact download)
      # BC_ARTIFACTS_DIR is intentionally NOT set so docker-compose uses a named
      # volume (bc-artifacts) which starts empty — forcing the entrypoint to
      # download artifacts itself. This validates the container download feature.
      env:
        BC_VERSION: "28.1"
        BC_RUNNER_IMAGE: ${{ needs.build-image.outputs.runner_image }}
      run: |
        STEP_START=$(date +%s)
        docker compose up -d 2>&1 | tail -10
        # Use the shared healthcheck script. 30-min budget covers the
        # in-container artifact download (~3 min) + BC boot (~3-5 min).
        ./scripts/wait-for-bc-healthy.sh 30
        echo "TOTAL_DURATION=$(($(date +%s) - STEP_START))" >> $GITHUB_ENV

    - name: Download timing summary
      if: always()
      run: |
        echo "=== In-container artifact download timing ==="
        docker compose logs bc 2>&1 | grep "\[artifacts\]"
        echo ""
        echo "Total start time (download + DB restore + BC startup): ${TOTAL_DURATION:-n/a}s"
