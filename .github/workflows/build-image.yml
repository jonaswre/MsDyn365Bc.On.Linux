name: Build and push bc-runner image

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'extensions/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Canonical image name MUST match what consumers pull. Keep this in sync
  # with the reusable workflow `runner_image` defaults and the copy-paste
  # workflow templates.
  IMAGE_NAME: jonaswre/msdyn365bc.on.linux/bc-runner

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: src/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        # Share registry cache with test-versions.yml's inline build job
        # so the two workflows reuse each other's layers instead of
        # rebuilding from scratch on every push.
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max
