name: BC container tests (compile from source)

# Plug-and-play GitHub Actions workflow for running AL tests against a
# Business Central container. This template COMPILES your AL source
# (app + test apps) inside the runner and then publishes the compiled
# .app files to BC and runs the tests.
#
# Powered by the Business Central container runtime — exposes the standard
# Business Central container network surface from a hosted runner. Image:
# ghcr.io/jonaswre/msdyn365bc.on.linux/bc-runner:latest
#
# ──────────────────────────────────────────────────────────────────────
# HOW TO USE
# ──────────────────────────────────────────────────────────────────────
# 1. Copy this file into your repo at .github/workflows/bc-test.yml
# 2. Edit the values under "env:" below to match your repo layout:
#      - BC_VERSION / BC_COUNTRY      → which BC version to test against
#      - APP_DIRS                     → directories containing app.json
#                                       for your production app(s).
#                                       Space-separated, leave empty if
#                                       you only have test apps.
#      - TEST_APP_DIRS                → directories containing app.json
#                                       for your test app(s)
#      - CODEUNIT_RANGE               → ID range of your TEST codeunits to
#                                       execute (e.g. "70000..70099").
#                                       Production codeunits aren't run,
#                                       only published.
# 3. Commit + push. The workflow runs on every PR and push to main.
#
# Anything more advanced (matrix over BC versions, secrets, custom
# symbol cache) — duplicate the job and tweak from there. The bc-runtime
# repo's own .github/workflows/test-versions.yml is a worked example.
# ──────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # ----- Edit these for your project ----------------------------------
  BC_VERSION: "latest"
  BC_COUNTRY: "w1"
  BC_TYPE: "onprem"
  BC_USERNAME: "admin"
  BC_PASSWORD: "admin"

  # Space-separated paths to your production AL app source dirs (each
  # must contain an app.json). Leave empty ("") if your repo only has
  # test apps.
  APP_DIRS: "app"

  # Space-separated paths to your AL test app source dirs.
  TEST_APP_DIRS: "test"

  # IDs of your TEST codeunits to execute. Pick a range that covers all
  # test codeunits in TEST_APP_DIRS — production codeunits in APP_DIRS
  # are published but not run.
  #
  # Accepted formats:
  #   "50000..99999"                       single AL range
  #   "50000..50100|130450..130459"        multiple ranges (pipe-separated)
  #   "50000,50001,50002"                  explicit ids
  #   "50000..50100,130450,200000..210000" mixed
  CODEUNIT_RANGE: "50000..99999"

  # AL compiler tool version. Leave blank to auto-derive from BC_VERSION
  # (recommended): BC 27.x → 16.2.28.57946, BC 28.x → 17.0.34.45391.
  # Set explicitly to pin a specific version.
  AL_TOOL_VERSION: ""

  # AL runtime version written into all app.json files before compile.
  # Auto-derived from BC_VERSION when blank: BC 27 → 16.0, BC 28 → 17.0.
  RUNTIME_VERSION: ""

  # Comma-separated preprocessor symbols passed to /define.
  # Example: "BC27PLUS,BC28PLUS" for a version-gated matrix leg.
  PREPROCESSOR_SYMBOLS: ""

  # ─── Optional: analyzers + ruleset ───────────────────────────────────
  # All off by default. Set to "true" / fill in to enable. The compile
  # step fails the workflow if any cop DLL fails to load (AD0001,
  # "Could not load", BadImageFormatException, PlatformNotSupportedException),
  # so a misconfigured cop can never produce a silently green build.
  # See ANALYZER-SUPPORT-PLAN.md in the runtime repo for the gotchas.
  ENABLE_CODE_COP: "false"
  ENABLE_UI_COP: "false"
  ENABLE_APP_SOURCE_COP: "false"
  ENABLE_PER_TENANT_EXTENSION_COP: "false"
  # Comma- or newline-separated list of additional cop DLLs. Each entry
  # is either a local path or an https:// URL. .nupkg URLs are unzipped
  # and every DLL under lib/net8.0/ is added — pointing at the ALCops
  # release nupkg makes all 7 cops + ALCops.Common.dll come along
  # automatically. Example:
  #   "https://github.com/ALCops/Analyzers/releases/download/v0.6.1/ALCops.Analyzers.0.6.1.nupkg"
  CUSTOM_CODE_COPS: ""
  # JSON ruleset (NOT the classic VS XML .ruleset format). Local path
  # or https:// URL.
  RULESET_FILE: ""
  # Set to "true" if RULESET_FILE has includedRuleSets[].path entries
  # pointing at https:// URLs (e.g. shared org-wide rulesets in a public
  # repo). Required by the AL compiler for any URL-scheme include.
  ENABLE_EXTERNAL_RULESETS: "false"
  # Mirror AL-Go's default: analyzers don't run on test apps. Set to
  # "true" to enforce cops on test apps too.
  ENABLE_CODE_ANALYZERS_ON_TEST_APPS: "false"
  # --------------------------------------------------------------------

  # Business Central runner image (publicly available on GHCR).
  BC_RUNNER_IMAGE: "ghcr.io/jonaswre/msdyn365bc.on.linux/bc-runner:latest"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ─── Phase 1: cheap parallel-friendly checkouts ──────────────────
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: project

      # The runtime repo ships docker-compose.yml, run-tests.sh, the bundled
      # TestRunnerExtension.app, and download-artifacts.sh.
      - name: Checkout Business Central runtime
        uses: actions/checkout@v4
        with:
          repository: jonaswre/MsDyn365Bc.On.Linux
          ref: master
          path: bc-runtime

      - name: Initialize timing
        run: bash bc-runtime/scripts/workflow-summary.sh init

      # ─── Phase 2: artifact download + docker image pull (parallel) ───
      - name: Download BC artifacts + pull docker images (parallel)
        run: |
          set -e
          bash bc-runtime/scripts/workflow-summary.sh begin DOWNLOAD "Download BC artifacts + pull docker images"
          mkdir -p "artifact-cache/$BC_VERSION"
          (
            bc-runtime/scripts/download-artifacts.sh \
              "$BC_TYPE" "$BC_VERSION" "$BC_COUNTRY" \
              "$PWD/artifact-cache/$BC_VERSION"
          ) &
          ARTIFACT_PID=$!
          (
            cd bc-runtime
            for attempt in 1 2 3 4 5; do
              if docker compose pull --quiet; then break; fi
              echo "docker compose pull failed (attempt $attempt/5); retrying in 15s..."
              sleep 15
            done
          ) &
          PULL_PID=$!
          wait $ARTIFACT_PID || { echo "artifact download failed"; exit 1; }
          wait $PULL_PID     || { echo "docker pull failed"; exit 1; }
          bash bc-runtime/scripts/workflow-summary.sh end DOWNLOAD

      # ─── Phase 3: figure out the BC_KEEP_APP_IDS for the entrypoint ──
      - name: Resolve apps to keep in BC database
        run: |
          bash bc-runtime/scripts/workflow-summary.sh begin RESOLVE "Resolve apps to keep"
          # Walk consumer app.json files, keep the 5-app baseline + any
          # non-test-framework transitive deps. Test framework is excluded
          # — the entrypoint's republish step does a fresh install.
          ARGS=""
          for d in $APP_DIRS $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            [ -f "project/$d/app.json" ] && ARGS="$ARGS --app-json project/$d/app.json"
          done
          KEEP_IDS=$(python3 bc-runtime/scripts/resolve-keep-app-ids.py \
            $ARGS \
            --artifact-dir "artifact-cache/$BC_VERSION")
          echo "Resolved keep set: $KEEP_IDS"
          echo "BC_CLEAR_ALL_APPS=selective" >> "$GITHUB_ENV"
          echo "BC_KEEP_APP_IDS=$KEEP_IDS" >> "$GITHUB_ENV"
          bash bc-runtime/scripts/workflow-summary.sh end RESOLVE

      # ─── Optional: stage an ISV/developer license ────────────────────
      # Without this step BC boots with the public Cronus license. To use
      # your own license, store it base64-encoded as a repo secret named
      # BC_LICENSE:
      #   base64 -w0 < your-license.bclicense | gh secret set BC_LICENSE
      # then uncomment the `if:` line below. The entrypoint imports the
      # license BEFORE NST starts, so no boot/import/restart cycle is
      # needed. Without the secret set, this step is a no-op.
      # Step always runs; the body skips itself when the secret is unset.
      # We can NOT use `if: secrets.BC_LICENSE != ''` — the `secrets`
      # context isn't allowed in step `if:` expressions (rejected by
      # GitHub at parse time, verified with actionlint).
      - name: Stage ISV license (if provided)
        env:
          BC_LICENSE_B64: ${{ secrets.BC_LICENSE }}
        run: |
          set -e
          if [ -z "${BC_LICENSE_B64:-}" ]; then
            echo "BC_LICENSE secret not set; using default Cronus license"
            exit 0
          fi
          LICENSE_PATH="$RUNNER_TEMP/bc-license.bclicense"
          printf '%s' "$BC_LICENSE_B64" | base64 -d > "$LICENSE_PATH"
          [ -s "$LICENSE_PATH" ] || { echo "ERROR: BC_LICENSE secret decoded to an empty file"; exit 1; }
          chmod 644 "$LICENSE_PATH"
          echo "BC_LICENSE_HOST_PATH=$LICENSE_PATH" >> "$GITHUB_ENV"
          echo "BC_LICENSE_FILE=/bc/custom-license.bclicense" >> "$GITHUB_ENV"

      # ─── Phase 4: kick off BC startup in the background ──────────────
      - name: Start Business Central container (background)
        env:
          BC_ARTIFACTS_DIR: ${{ github.workspace }}/artifact-cache/${{ env.BC_VERSION }}
        working-directory: bc-runtime
        run: |
          bash scripts/workflow-summary.sh begin BC_BOOT "BC startup (background → wait for healthy)"
          docker compose up -d
          echo "BC container started in background — continuing with other work."

      # ─── Phase 5: work that runs DURING BC's startup window ──────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install AL compiler
        run: |
          bash bc-runtime/scripts/workflow-summary.sh begin AL_INSTALL "Install AL compiler"
          TOOL="$AL_TOOL_VERSION"
          BC_MAJOR=$(echo "$BC_VERSION" | cut -d. -f1)
          if [ -z "$TOOL" ]; then
            case "$BC_MAJOR" in
              27) TOOL="16.2.28.57946" ;;
              28) TOOL="17.0.34.45391" ;;
              *)
                echo "::warning::BC_VERSION major $BC_MAJOR not in al_tool table — using fallback 16.2.28.57946"
                TOOL="16.2.28.57946"
                ;;
            esac
          fi
          echo "Installing AL compiler $TOOL"
          dotnet tool install -g \
            Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux \
            --version "$TOOL" 2>/dev/null || true
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          bash bc-runtime/scripts/workflow-summary.sh end AL_INSTALL

      - name: Stage symbols from BC artifacts
        env:
          APP_DIRS: ${{ env.APP_DIRS }}
          TEST_APP_DIRS: ${{ env.TEST_APP_DIRS }}
        run: |
          bash bc-runtime/scripts/workflow-summary.sh begin SYMBOLS "Stage symbols"
          mkdir -p symbols
          # Manifest-driven resolver: index every artifact .app by its
          # declared id, then stage the transitive dependency closure for
          # the consumer app.json files. This stays stable when Microsoft
          # moves apps between artifact folders across BC versions.
          ARGS=""
          for d in $APP_DIRS $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            [ -f "project/$d/app.json" ] && ARGS="$ARGS --app-json project/$d/app.json"
          done
          python3 bc-runtime/scripts/stage-symbols.py \
            $ARGS \
            --artifact-dir "artifact-cache/$BC_VERSION" \
            --out-dir symbols \
            || true
          echo "Staged $(ls symbols/*.app 2>/dev/null | wc -l) symbol files"
          bash bc-runtime/scripts/workflow-summary.sh end SYMBOLS

      - name: Patch app.json runtime
        run: |
          EFFECTIVE_RUNTIME="$RUNTIME_VERSION"
          BC_MAJOR=$(echo "$BC_VERSION" | cut -d. -f1)
          if [ -z "$EFFECTIVE_RUNTIME" ]; then
            case "$BC_MAJOR" in
              27) EFFECTIVE_RUNTIME="16.0" ;;
              28) EFFECTIVE_RUNTIME="17.0" ;;
              *)
                echo "::warning::BC_VERSION major $BC_MAJOR not in runtime table — using fallback 14.0"
                EFFECTIVE_RUNTIME="14.0"
                ;;
            esac
          fi
          echo "Patching app.json runtime → $EFFECTIVE_RUNTIME"
          for d in $APP_DIRS $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            F="project/$d/app.json"
            [ -f "$F" ] || continue
            python3 - "$F" "$EFFECTIVE_RUNTIME" <<'PYEOF'
          import sys, json, pathlib
          p = pathlib.Path(sys.argv[1])
          d = json.loads(p.read_text())
          if d.get("runtime") != sys.argv[2]:
              d["runtime"] = sys.argv[2]
              p.write_text(json.dumps(d, indent=2) + "\n")
              print(f"  patched {p}: runtime → {sys.argv[2]}")
          else:
              print(f"  {p}: runtime already {sys.argv[2]}, skip")
          PYEOF
          done

      - name: Compile AL apps (no publish yet)
        run: |
          set -e
          bash bc-runtime/scripts/workflow-summary.sh begin COMPILE "Compile AL apps"

          # ─── Resolve analyzer flags via the helper ─────────────────
          # Build the helper invocation only when SOMETHING is configured.
          # When nothing is set, ANALYZER_FLAGS stays empty and the
          # compile commands run exactly as they did before this feature
          # existed. resolve-analyzers.py handles: Microsoft cop path
          # resolution from the AL tool dir, downloading URL-referenced
          # custom cops, .nupkg auto-extraction (so ALCops.Common.dll
          # comes along automatically), and remote ruleset downloads.
          HELPER_ARGS=()
          [ "$ENABLE_CODE_COP" = "true" ] && HELPER_ARGS+=(--enable-code-cop)
          [ "$ENABLE_UI_COP" = "true" ] && HELPER_ARGS+=(--enable-ui-cop)
          [ "$ENABLE_APP_SOURCE_COP" = "true" ] && HELPER_ARGS+=(--enable-app-source-cop)
          [ "$ENABLE_PER_TENANT_EXTENSION_COP" = "true" ] && HELPER_ARGS+=(--enable-per-tenant-extension-cop)
          [ -n "$CUSTOM_CODE_COPS" ] && HELPER_ARGS+=(--custom-code-cops "$CUSTOM_CODE_COPS")
          [ -n "$RULESET_FILE" ] && HELPER_ARGS+=(--ruleset-file "$RULESET_FILE")
          [ "$ENABLE_EXTERNAL_RULESETS" = "true" ] && HELPER_ARGS+=(--enable-external-rulesets)

          # Run the helper to a tempfile rather than via process substitution.
          # `mapfile -t < <(python3 ...)` SILENTLY SWALLOWS the helper's exit
          # code, so if the helper bails on a missing path the workflow
          # silently compiles without analyzers and reports a green build.
          # The tempfile pattern lets `if ! ...` see the real exit code.
          # --project-root project prepends the consumer checkout dir to
          # any local paths (URLs pass through).
          ANALYZER_FLAGS=()
          if [ ${#HELPER_ARGS[@]} -gt 0 ]; then
            HELPER_OUT=$(mktemp)
            if ! python3 bc-runtime/scripts/resolve-analyzers.py \
                --project-root project \
                "${HELPER_ARGS[@]}" > "$HELPER_OUT"; then
              echo "ERROR: resolve-analyzers.py failed — check stderr above" >&2
              rm -f "$HELPER_OUT"
              exit 1
            fi
            mapfile -t ANALYZER_FLAGS < "$HELPER_OUT"
            rm -f "$HELPER_OUT"
            echo "Analyzer flags: ${ANALYZER_FLAGS[*]}"
          fi

          # ─── Pattern that catches every analyzer load failure mode ──
          # AL compile reports these as WARNINGS (AD0001 specifically),
          # so without this guard a misconfigured cop would silently
          # disable itself and the workflow would report a green build
          # with no cops actually enforced. Failing here is the only
          # way you learn your cop wiring is broken.
          ANALYZER_LOAD_FAIL_PATTERN='AD0001|Could not load|BadImageFormatException|PlatformNotSupportedException'

          PP_FLAG=()
          [ -n "$PREPROCESSOR_SYMBOLS" ] && PP_FLAG=("/define:$PREPROCESSOR_SYMBOLS")

          compile_dir() {
            local src="$1"
            shift
            [ -f "$src/app.json" ] || { echo "skip $src (no app.json)" >&2; return 0; }
            mkdir -p "$src/.alpackages"
            cp symbols/*.app "$src/.alpackages/" 2>/dev/null || true
            local out
            out="$(pwd)/build/$(basename "$src").app"
            mkdir -p build
            echo ">>> Compiling $src → $out"
            # Remaining args ($@) are the analyzer flag fragments — may be empty.
            if [ "$#" -gt 0 ]; then
              local tmplog rc
              tmplog=$(mktemp)
              AL compile "/project:$src" "/packagecachepath:$src/.alpackages" "/out:$out" "${PP_FLAG[@]}" "$@" 2>&1 | tee "$tmplog"
              rc=${PIPESTATUS[0]}
              if [ "$rc" -ne 0 ]; then
                rm -f "$tmplog"
                return $rc
              fi
              if grep -qE "$ANALYZER_LOAD_FAIL_PATTERN" "$tmplog"; then
                echo "ERROR: analyzer load failure detected in compile output for $src" >&2
                grep -E "$ANALYZER_LOAD_FAIL_PATTERN" "$tmplog" >&2
                rm -f "$tmplog"
                return 1
              fi
              rm -f "$tmplog"
            else
              AL compile "/project:$src" "/packagecachepath:$src/.alpackages" "/out:$out" "${PP_FLAG[@]}"
            fi
          }

          # Production apps always get the analyzer flags (when configured).
          for d in $APP_DIRS; do
            [ -z "$d" ] && continue
            compile_dir "project/$d" "${ANALYZER_FLAGS[@]}"
          done

          # Test apps get analyzer flags only when explicitly opted in.
          # Mirrors AL-Go's default of "analyzers don't run on test apps."
          for d in $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            mkdir -p "project/$d/.alpackages"
            cp build/*.app "project/$d/.alpackages/" 2>/dev/null || true
            if [ "$ENABLE_CODE_ANALYZERS_ON_TEST_APPS" = "true" ]; then
              compile_dir "project/$d" "${ANALYZER_FLAGS[@]}"
            else
              compile_dir "project/$d"
            fi
          done

          bash bc-runtime/scripts/workflow-summary.sh end COMPILE

      # ─── Phase 6: synchronization point — wait for BC to be healthy ──
      - name: Wait for BC healthy
        working-directory: bc-runtime
        run: |
          ./scripts/wait-for-bc-healthy.sh 30
          ./scripts/verify-network-surface.sh
          bash scripts/workflow-summary.sh end BC_BOOT

      # ─── Phase 7: publish compiled apps to the now-running BC ────────
      - name: Publish AL apps to BC
        env:
          AUTH: "${{ env.BC_USERNAME }}:${{ env.BC_PASSWORD }}"
          DEV: "http://localhost:7049/BC/dev"
        run: |
          set -e
          bash bc-runtime/scripts/workflow-summary.sh begin PUBLISH "Publish AL apps"
          # shellcheck disable=SC1091
          . bc-runtime/scripts/publish-app.sh
          PUBLISHED_COUNT=0
          for d in $APP_DIRS $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            bc_publish_app "build/$(basename "$d").app" "$DEV" "$AUTH" || exit 1
            PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1))
          done
          bash bc-runtime/scripts/workflow-summary.sh count apps_published "$PUBLISHED_COUNT"
          COMPILED_COUNT=$(ls build/*.app 2>/dev/null | wc -l)
          bash bc-runtime/scripts/workflow-summary.sh count apps_compiled "$COMPILED_COUNT"
          bash bc-runtime/scripts/workflow-summary.sh end PUBLISH

      - name: Run AL tests
        working-directory: bc-runtime
        run: |
          set -e
          bash scripts/workflow-summary.sh begin TESTS "Run AL tests"
          # Iterate only the test apps (we know which ones from TEST_APP_DIRS).
          # Production apps in APP_DIRS are already published but we don't run
          # tests on them — they have no test codeunits.
          TESTS_TOTAL=0; TESTS_PASSED=0; TESTS_FAILED=0; CODEUNITS_TOTAL=0
          for d in $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            app="../build/$(basename "$d").app"
            [ -f "$app" ] || { echo "skip: $app (not built)"; continue; }
            base=$(basename "$app")
            echo "=== Running tests in $base ==="
            tmplog=$(mktemp)
            ./scripts/run-tests.sh \
              --app "$app" \
              --auth "${BC_USERNAME}:${BC_PASSWORD}" \
              --codeunit-range "$CODEUNIT_RANGE" \
              --timeout 30 2>&1 | tee "$tmplog"
            line=$(grep -oE 'total=[0-9]+ passed=[0-9]+ failed=[0-9]+|[0-9]+ total, [0-9]+ passed, [0-9]+ failed' "$tmplog" | tail -1 || true)
            if [ -n "$line" ]; then
              if [[ "$line" == total=* ]]; then
                t=$(echo "$line" | sed -n 's/.*total=\([0-9][0-9]*\).*/\1/p')
                p=$(echo "$line" | sed -n 's/.*passed=\([0-9][0-9]*\).*/\1/p')
                f=$(echo "$line" | sed -n 's/.*failed=\([0-9][0-9]*\).*/\1/p')
              else
                t=$(echo "$line" | grep -oE '^[0-9]+')
                p=$(echo "$line" | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+')
                f=$(echo "$line" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+')
              fi
              TESTS_TOTAL=$((TESTS_TOTAL + ${t:-0}))
              TESTS_PASSED=$((TESTS_PASSED + ${p:-0}))
              TESTS_FAILED=$((TESTS_FAILED + ${f:-0}))
            fi
            cu=$(grep -oE 'Test codeunits: [^ ]+' "$tmplog" | head -1 | sed 's/Test codeunits: //')
            if [ -n "$cu" ]; then
              n=$(echo "$cu" | tr ',' '\n' | grep -c .)
              CODEUNITS_TOTAL=$((CODEUNITS_TOTAL + n))
            fi
            rm -f "$tmplog"
          done
          bash scripts/workflow-summary.sh count tests_total    "$TESTS_TOTAL"
          bash scripts/workflow-summary.sh count tests_passed   "$TESTS_PASSED"
          bash scripts/workflow-summary.sh count tests_failed   "$TESTS_FAILED"
          bash scripts/workflow-summary.sh count codeunits_total "$CODEUNITS_TOTAL"
          bash scripts/workflow-summary.sh end TESTS

      - name: Workflow timing summary + telemetry
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          BC_TELEMETRY_OPT_OUT: ${{ vars.BC_TELEMETRY_OPT_OUT || 'false' }}
        run: bash bc-runtime/scripts/workflow-summary.sh emit

      - name: BC logs (on failure)
        if: failure()
        working-directory: bc-runtime
        run: docker compose logs bc | tail -200
