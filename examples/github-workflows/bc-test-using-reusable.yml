name: BC Tests

# Tiny consumer workflow that delegates to a reusable workflow hosted in
# jonaswre/MsDyn365Bc.On.Linux. Copy this file into your repo at
# .github/workflows/bc-test.yml, edit the `with:` block, commit, push.
#
# Two flavours are available, pick whichever fits:
#   * bc-test-from-source.yml — compiles AL source from your repo
#   * bc-test-prebuilt.yml    — publishes existing .app files
#
# This example uses the from-source flavour. For the prebuilt flavour,
# replace the `uses:` line and the `with:` keys with the prebuilt set
# (test_app_files / app_files instead of test_app_dirs / app_dirs).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  bc-tests:
    uses: jonaswre/MsDyn365Bc.On.Linux/.github/workflows/bc-test-from-source.yml@master
    with:
      bc_version:     "latest"
      bc_country:     "w1"
      bc_username:    ${{ vars.BC_USERNAME }}
      bc_password:    ${{ secrets.BC_PASSWORD }}
      sql_sa_password: ${{ secrets.BC_SQL_SA_PASSWORD }}
      app_dirs:       "app"          # space-separated dirs containing app.json
      test_app_dirs:  "test"         # ditto for test apps
      # codeunit_range accepts:
      #   "50000..99999"                  single AL range
      #   "50000..50100|130450..130459"   multiple ranges (pipe-separated)
      #   "50000,50001,50002"             explicit ids
      codeunit_range: "50000..99999"

      # ─── Optional: analyzers + rulesets ─────────────────────────────
      # All off by default. Uncomment to enable. The reusable workflow
      # fails the job if any analyzer DLL fails to load (AD0001,
      # "Could not load", BadImageFormatException, PlatformNotSupportedException),
      # so a misconfigured cop can never produce a silently green build.
      #
      # See ANALYZER-SUPPORT-PLAN.md in the runtime repo for the full
      # list of gotchas (JSON-only rulesets, /enableexternalrulesets
      # requirement, ALCops.Common.dll co-load, etc.).
      #
      # enable_code_cop: true
      # enable_ui_cop: true
      # enable_app_source_cop: true
      # enable_per_tenant_extension_cop: true
      #
      # Custom cop DLLs — local paths or https:// URLs, comma-separated.
      # .nupkg URLs are unzipped and every DLL under lib/net8.0/ is
      # added automatically, which makes ALCops and similar "just work":
      #
      # custom_code_cops: "https://github.com/ALCops/Analyzers/releases/download/v0.6.1/ALCops.Analyzers.0.6.1.nupkg"
      #
      # JSON ruleset (NOT the classic Visual Studio XML .ruleset format).
      # Can be a local repo path or an https:// URL:
      #
      # ruleset_file: "rules.rulset.json"
      # enable_external_rulesets: true    # needed if your ruleset has includedRuleSets[].path entries pointing at URLs
      #
      # Mirror AL-Go's default: analyzers don't run on test apps. Flip
      # this to true to enforce cops on test apps too.
      # enable_code_analyzers_on_test_apps: false

    # Optional: ISV / developer license. Without this, BC boots with the
    # public Cronus license (which is fine for most test scenarios). If
    # you need your own license, base64-encode it and store as a repo
    # secret named BC_LICENSE:
    #
    #   base64 -w0 < your-license.bclicense | gh secret set BC_LICENSE
    #
    # Then uncomment the secrets block below. The reusable workflow
    # imports the license BEFORE NST starts, so no boot/import/restart
    # cycle is needed.
    #
    # secrets:
    #   bc_license: ${{ secrets.BC_LICENSE }}

  # ─── Prebuilt flavour example (commented out) ─────────────────────────
  #
  # bc-tests-prebuilt:
  #   uses: jonaswre/MsDyn365Bc.On.Linux/.github/workflows/bc-test-prebuilt.yml@master
  #   with:
  #     bc_version:     "latest"
  #     bc_username:    ${{ vars.BC_USERNAME }}
  #     bc_password:    ${{ secrets.BC_PASSWORD }}
  #     sql_sa_password: ${{ secrets.BC_SQL_SA_PASSWORD }}
  #     test_app_files: "tests/MyTests.app"
  #     # See above for the accepted codeunit_range formats.
  #     codeunit_range: "50000..99999"
  #   # Same optional license pattern as above:
  #   # secrets:
  #   #   bc_license: ${{ secrets.BC_LICENSE }}
