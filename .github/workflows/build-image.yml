name: Build and push bc-runner image

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-image.yml'
      - 'src/**'
      - 'scripts/**'
      - 'extensions/**'
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push the built bc-runner image to GHCR"
        required: false
        default: "false"

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      id: image
      run: |
        image_name="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner"
        echo "image=${REGISTRY}/${image_name}" >> "$GITHUB_OUTPUT"

    - name: Decide whether to publish
      id: publish
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.push_image }}" = "true" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
        elif [ "${{ github.repository }}" = "StefanMaron/MsDyn365Bc.On.Linux" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Explain build-only mode
      if: steps.publish.outputs.enabled != 'true'
      run: |
        echo "Building bc-runner without pushing to GHCR."
        echo "Set workflow_dispatch input push_image=true to publish from this repository."

    - name: Log in to GHCR
      if: steps.publish.outputs.enabled == 'true'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      if: steps.publish.outputs.enabled != 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: src/Dockerfile
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push image
      if: steps.publish.outputs.enabled == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: src/Dockerfile
        push: true
        tags: |
          ${{ steps.image.outputs.image }}:latest
          ${{ steps.image.outputs.image }}:${{ github.sha }}
        # Share registry cache with test-versions.yml's inline build job
        # so the two workflows reuse each other's layers instead of
        # rebuilding from scratch on every push.
        cache-from: type=registry,ref=${{ steps.image.outputs.image }}:cache
        cache-to: type=registry,ref=${{ steps.image.outputs.image }}:cache,mode=max
