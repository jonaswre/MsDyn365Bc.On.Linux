services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      SA_PASSWORD: ${SA_PASSWORD:?Set SA_PASSWORD to a non-default SQL sa password}
      MSSQL_MEMORY_LIMIT_MB: ${MSSQL_MEMORY_LIMIT_MB:-2048}
    expose:
      - "1433"
    volumes:
      - bc-sql-data:/var/opt/mssql
      - ${BC_ARTIFACTS_DIR:-bc-artifacts}:/bc/artifacts:ro
      # Custom license bind mount also exposed to SQL Server, because the
      # entrypoint imports the license via OPENROWSET BULK which reads the
      # file from SQL's filesystem (not bc's). Same default of /dev/null
      # when BC_LICENSE_HOST_PATH is unset — see notes on the bc service.
      - ${BC_LICENSE_HOST_PATH:-/dev/null}:/bc/custom-license.bclicense:ro
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD:?Set SA_PASSWORD to a non-default SQL sa password}' -C -No -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 20s

  bc:
    image: ${BC_RUNNER_IMAGE:-ghcr.io/stefanmaron/msdyn365bc.on.linux/bc-runner:latest}
    # Pull the published image if it's not already in the local cache. Because a
    # `build:` section is present, Compose would otherwise BUILD on first `up`
    # (the Build Spec default) — which forces every community user through a
    # 5-10 min local build. `missing` flips that to pull-by-default; only an
    # explicit `docker compose build` rebuilds. Developers iterating on the image
    # build locally (which tags this same ref), so their build shadows the pull.
    # To track newer published builds: `docker compose pull bc`.
    pull_policy: missing
    platform: linux/amd64
    build:
      context: .
      dockerfile: src/Dockerfile
    mem_limit: ${BC_MEMORY_LIMIT:-8G}
    dns: ${BC_DNS:-}
    stdin_open: true
    depends_on:
      sql:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BC_CLIENT_SERVICES_PORT:-7046}:7046"
      - "127.0.0.1:${BC_SOAP_PORT:-7047}:7047"
      - "127.0.0.1:${BC_DEV_PORT:-7049}:7049"
      - "127.0.0.1:${BC_ODATA_PORT:-7048}:7048"
      - "127.0.0.1:${BC_API_PORT:-7052}:7052"
      - "127.0.0.1:${BC_MGMT_PORT:-7045}:7045"
      - "127.0.0.1:${BC_MGMT_API_PORT:-7086}:7086"
      - "127.0.0.1:${BC_CLIENT_PORT:-7085}:7085"
      # Web client (PoC, opt-in via BC_WEBCLIENT=1 — see docs/WEBCLIENT-POC.md)
      - "127.0.0.1:${BC_WEBCLIENT_PORT:-8080}:8080"
    environment:
      BC_VERSION: ${BC_VERSION:-latest}
      BC_COUNTRY: ${BC_COUNTRY:-w1}
      BC_TYPE: ${BC_TYPE:-onprem}
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      BC_USERNAME: ${BC_USERNAME:?Set BC_USERNAME to a non-default BC user}
      BC_PASSWORD: ${BC_PASSWORD:?Set BC_PASSWORD to a non-default BC password}
      BC_INCLUDE_TEST_TOOLKIT: ${BC_INCLUDE_TEST_TOOLKIT:-false}
      BC_ENABLE_CI_SQL_TUNING: ${BC_ENABLE_CI_SQL_TUNING:-false}
      BC_CLIENT_SERVICES_ENABLED: ${BC_CLIENT_SERVICES_ENABLED:-true}
      BC_SOAP_SERVICES_ENABLED: ${BC_SOAP_SERVICES_ENABLED:-true}
      BC_ODATA_SERVICES_ENABLED: ${BC_ODATA_SERVICES_ENABLED:-true}
      BC_API_SERVICES_ENABLED: ${BC_API_SERVICES_ENABLED:-true}
      BC_DEV_SERVICES_ENABLED: ${BC_DEV_SERVICES_ENABLED:-false}
      BC_MANAGEMENT_SERVICES_ENABLED: ${BC_MANAGEMENT_SERVICES_ENABLED:-false}
      BC_MANAGEMENT_API_SERVICES_ENABLED: ${BC_MANAGEMENT_API_SERVICES_ENABLED:-false}
      BC_TEST_AUTOMATION_ENABLED: ${BC_TEST_AUTOMATION_ENABLED:-false}
      BC_ALLOW_INSECURE_AUTH_BYPASS: ${BC_ALLOW_INSECURE_AUTH_BYPASS:-false}
      BC_MEMORY_LIMIT: ${BC_MEMORY_LIMIT:-8G}
      BC_DNS: ${BC_DNS:-}
      BC_API_REQUEST_LIMIT: ${BC_API_REQUEST_LIMIT:-50}
      SA_PASSWORD: ${SA_PASSWORD:?Set SA_PASSWORD to a non-default SQL sa password}
      BC_CLEAR_ALL_APPS: ${BC_CLEAR_ALL_APPS:-false}
      BC_SKIP_APP_PUBLISH: ${BC_SKIP_APP_PUBLISH:-false}
      BC_KEEP_APP_IDS: ${BC_KEEP_APP_IDS:-}
      # Custom license override: when set, the entrypoint imports the file
      # at this path INSTEAD of the artifact's default Cronus.bclicense.
      # The volume mount below makes /bc/custom-license.bclicense the
      # canonical mount point — set BC_LICENSE_HOST_PATH on the host shell
      # to the source file and BC_LICENSE_FILE=/bc/custom-license.bclicense
      # to wire it through. ISVs use this to skip the boot → import →
      # restart NST cycle on every fresh container.
      BC_LICENSE_FILE: ${BC_LICENSE_FILE:-}
      # Diagnostic only — comma-separated patch IDs to skip (e.g. "14,15,15a,15b,checkfile").
      # Used to bisect Cecil patches that may cause AL→C# emission drift. Empty = production.
      BC_DISABLE_PATCHES: ${BC_DISABLE_PATCHES:-}
      # Diagnostic only — when 1, NST suspends at startup waiting for a diagnostic
      # client (dotnet-trace) on /tmp/nst-diag.sock. Used to profile cold boot.
      BC_PROFILE_NST: ${BC_PROFILE_NST:-0}
      # Diagnostic only — when set, the StartupHook reporting proxy writes
      # report render payloads for local renderer investigation.
      BC_REPORTING_DUMP_DIR: ${BC_REPORTING_DUMP_DIR:-}
      BC_ARTIFACT_URL: ${BC_ARTIFACT_URL:-}
      BC_TEST_APPS: ${BC_TEST_APPS:-}
      # Opt-in: self-host Microsoft's real BC web client on Kestrel (port 8080).
      # EXPERIMENTAL PoC — see docs/WEBCLIENT-POC.md.
      BC_WEBCLIENT: ${BC_WEBCLIENT:-0}
      SQL_SERVER: sql
      # .NET runtime tuning. Defaults are inherited from the entrypoint
      # (gcServer=1, TieredCompilation=0). These pass-throughs let us A/B
      # test additional knobs without rebuilding the image.
      DOTNET_TieredCompilation: ${DOTNET_TieredCompilation:-}
      DOTNET_TC_QuickJitForLoops: ${DOTNET_TC_QuickJitForLoops:-}
      DOTNET_ReadyToRun: ${DOTNET_ReadyToRun:-}
      DOTNET_GCRetainVM: ${DOTNET_GCRetainVM:-}
      DOTNET_GCConserveMemory: ${DOTNET_GCConserveMemory:-}
      DOTNET_GCHeapCount: ${DOTNET_GCHeapCount:-}
      DOTNET_GCNoAffinitize: ${DOTNET_GCNoAffinitize:-}
    volumes:
      - ${BC_ARTIFACTS_DIR:-bc-artifacts}:/bc/artifacts
      - bc-service:/bc/service
      # Optional bind mount for an ISV/developer license. Set BC_LICENSE_HOST_PATH
      # to the absolute path of a .bclicense file on the host; the entrypoint will
      # import it (when BC_LICENSE_FILE=/bc/custom-license.bclicense is also set)
      # before NST starts. Defaults to /dev/null when unset, so the file appears as
      # a character device — the entrypoint's `[ -f ]` check fails and the default
      # Cronus license is used. No effect when unset.
      - ${BC_LICENSE_HOST_PATH:-/dev/null}:/bc/custom-license.bclicense:ro
    healthcheck:
      test: ["CMD", "/bc/scripts/healthcheck.sh"]
      # 5s interval (was 15s) so wait-for-bc-healthy.sh sees the transition within ~5s
      # of the entrypoint touching /tmp/bc-ready. The probe verifies every
      # published BC network surface: legacy management/client-services TCP plus
      # SOAP, OData, API, DevServices, Management API, and WebClient HTTP.
      interval: 5s
      retries: 360            # 5s × 360 = 30 min after start_period (was 15s × 120)
      start_period: 60s
      timeout: 5s             # was 10s; the probe is cheap, fail fast

volumes:
  bc-artifacts:
  bc-service:
  bc-sql-data:
