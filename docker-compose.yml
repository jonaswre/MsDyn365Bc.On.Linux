services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-CU17-ubuntu-22.04
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-Passw0rd123!}
      MSSQL_MEMORY_LIMIT_MB: ${MSSQL_MEMORY_LIMIT_MB:-2048}
    ports:
      - "${SQL_PORT:-11433}:1433"
    user: "0:0"
    tmpfs:
      - /var/opt/mssql/data:size=4g
    volumes:
      - ${BC_ARTIFACTS_DIR:-bc-artifacts}:/bc/artifacts:ro
      # Custom license bind mount also exposed to SQL Server, because the
      # entrypoint imports the license via OPENROWSET BULK which reads the
      # file from SQL's filesystem (not bc's). Same default of /dev/null
      # when BC_LICENSE_HOST_PATH is unset — see notes on the bc service.
      - ${BC_LICENSE_HOST_PATH:-/dev/null}:/bc/custom-license.bclicense:ro
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD:-Passw0rd123!}' -C -No -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 20s

  bc:
    image: ${BC_RUNNER_IMAGE:-bc-runner:local}
    platform: linux/amd64
    build:
      context: .
      dockerfile: src/Dockerfile
    stdin_open: true
    depends_on:
      sql:
        condition: service_healthy
    ports:
      - "${BC_DEV_PORT:-7049}:7049"
      - "${BC_ODATA_PORT:-7048}:7048"
      - "${BC_API_PORT:-7052}:7052"
      - "${BC_MGMT_PORT:-7045}:7045"
      - "${BC_CLIENT_PORT:-7085}:7085"
    environment:
      BC_VERSION: ${BC_VERSION:-28.1}
      BC_COUNTRY: ${BC_COUNTRY:-w1}
      BC_TYPE: ${BC_TYPE:-sandbox}
      SA_PASSWORD: ${SA_PASSWORD:-Passw0rd123!}
      BC_CLEAR_ALL_APPS: ${BC_CLEAR_ALL_APPS:-false}
      BC_SKIP_APP_PUBLISH: ${BC_SKIP_APP_PUBLISH:-false}
      BC_KEEP_APP_IDS: ${BC_KEEP_APP_IDS:-}
      # Custom license override: when set, the entrypoint imports the file
      # at this path INSTEAD of the artifact's default Cronus.bclicense.
      # The volume mount below makes /bc/custom-license.bclicense the
      # canonical mount point — set BC_LICENSE_HOST_PATH on the host shell
      # to the source file and BC_LICENSE_FILE=/bc/custom-license.bclicense
      # to wire it through. ISVs use this to skip the boot → import →
      # restart NST cycle on every fresh container.
      BC_LICENSE_FILE: ${BC_LICENSE_FILE:-}
      # Diagnostic only — comma-separated patch IDs to skip (e.g. "14,15,15a,15b,checkfile").
      # Used to bisect Cecil patches that may cause AL→C# emission drift. Empty = production.
      BC_DISABLE_PATCHES: ${BC_DISABLE_PATCHES:-}
      # Diagnostic only — when 1, NST suspends at startup waiting for a diagnostic
      # client (dotnet-trace) on /tmp/nst-diag.sock. Used to profile cold boot.
      BC_PROFILE_NST: ${BC_PROFILE_NST:-0}
      BC_ARTIFACT_URL: ${BC_ARTIFACT_URL:-}
      BC_TEST_APPS: ${BC_TEST_APPS:-}
      SQL_SERVER: sql
      # .NET runtime tuning. Defaults are inherited from the entrypoint
      # (gcServer=1, TieredCompilation=0). These pass-throughs let us A/B
      # test additional knobs without rebuilding the image.
      DOTNET_TieredCompilation: ${DOTNET_TieredCompilation:-}
      DOTNET_TC_QuickJitForLoops: ${DOTNET_TC_QuickJitForLoops:-}
      DOTNET_ReadyToRun: ${DOTNET_ReadyToRun:-}
      DOTNET_GCRetainVM: ${DOTNET_GCRetainVM:-}
      DOTNET_GCConserveMemory: ${DOTNET_GCConserveMemory:-}
      DOTNET_GCHeapCount: ${DOTNET_GCHeapCount:-}
      DOTNET_GCNoAffinitize: ${DOTNET_GCNoAffinitize:-}
    volumes:
      - ${BC_ARTIFACTS_DIR:-bc-artifacts}:/bc/artifacts
      - bc-service:/bc/service
      # Optional bind mount for an ISV/developer license. Set BC_LICENSE_HOST_PATH
      # to the absolute path of a .bclicense file on the host; the entrypoint will
      # import it (when BC_LICENSE_FILE=/bc/custom-license.bclicense is also set)
      # before NST starts. Defaults to /dev/null when unset, so the file appears as
      # a character device — the entrypoint's `[ -f ]` check fails and the default
      # Cronus license is used. No effect when unset.
      - ${BC_LICENSE_HOST_PATH:-/dev/null}:/bc/custom-license.bclicense:ro
    healthcheck:
      test: test -f /tmp/bc-ready && curl -sf -o /dev/null -u BCRUNNER:Admin123! http://localhost:7048/BC/ODataV4/Company || exit 1
      # 5s interval (was 15s) so wait-for-bc-healthy.sh sees the transition within ~5s
      # of the entrypoint touching /tmp/bc-ready. Saves ~10-15s of slack on every cold
      # boot. The OData /Company probe is cheap; running it every 5s instead of every
      # 15s during the start_period grace window adds negligible NST load.
      interval: 5s
      retries: 360            # 5s × 360 = 30 min after start_period (was 15s × 120)
      start_period: 60s
      timeout: 5s             # was 10s; the probe is cheap, fail fast

volumes:
  bc-artifacts:
  bc-service:
