name: BC test (from source) [reusable]

# Reusable workflow that compiles AL source from the calling repo, publishes
# it to a Business Central NST running on Linux, and executes the AL tests.
#
# Consumer usage (paste into .github/workflows/bc-test.yml in your repo):
#
#   name: BC Tests
#   on: [push, pull_request, workflow_dispatch]
#   jobs:
#     test:
#       uses: StefanMaron/MsDyn365Bc.On.Linux/.github/workflows/bc-test-from-source.yml@master
#       with:
#         bc_version:     "27.5"
#         app_dirs:       "app"
#         test_app_dirs:  "test"
#         codeunit_range: "50000..99999"
#
# Inputs are documented under workflow_call below. For pre-built .app files
# (no compile step), use bc-test-prebuilt.yml instead.

on:
  workflow_call:
    inputs:
      bc_version:
        description: "BC platform version (e.g. 27.5)"
        required: false
        type: string
        default: "27.5"
      bc_country:
        description: "BC country code (e.g. w1, de, us)"
        required: false
        type: string
        default: "w1"
      bc_type:
        description: "BC artifact type (sandbox or onprem)"
        required: false
        type: string
        default: "sandbox"
      app_dirs:
        description: "Space-separated dirs containing app.json for production apps (compile order)"
        required: false
        type: string
        default: ""
      test_app_dirs:
        description: "Space-separated dirs containing app.json for test apps"
        required: true
        type: string
      codeunit_range:
        description: |
          Test codeunit IDs to execute. This is the range of your TEST codeunits —
          production app codeunits aren't run, only published. Accepted formats:
            "50000..99999"                       single AL range
            "50000..50100|130450..130459"        multiple ranges (pipe-separated)
            "50000,50001,50002"                  explicit ids (comma-separated)
            "50000..50100,130450,200000..210000" mixed
        required: true
        type: string
      preprocessor_symbols:
        description: >-
          Comma-separated preprocessor symbols passed to /define
          (e.g. "BC27PLUS,BC28PLUS"). Empty = no flag passed to the compiler.
        required: false
        type: string
        default: ""
      runtime_version:
        description: >-
          Override app.json "runtime" before compile (e.g. "16.0" for BC 27,
          "17.0" for BC 28). Auto-derived from bc_version when blank.
          Set explicitly to suppress auto-derive for edge cases.
        required: false
        type: string
        default: ""
      al_tool_version:
        description: "Linux AL compiler tool version (Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux NuGet). Auto-derived from bc_version when blank: BC 27 → 16.2.28.57946, BC 28 → 17.0.34.45391."
        required: false
        type: string
        default: ""
      test_runner:
        description: >-
          Test execution engine. "auto" (default) = probe the live server
          after BC is healthy and use the altool runner when the dev
          endpoint advertises Dev API 7.0 (BC 28.0+), otherwise fall back
          to the websocket runner — leaner where supported, works
          everywhere. "websocket" = force the OData suite + WebSocket
          client-session flow (scripts/run-tests.sh), which works on every
          supported BC version. "altool" = force the AL dotnet tool's
          native `al runtests` command driving the NST's built-in
          /dev/TestRunnerHub SignalR hub (scripts/run-tests-altool.py);
          fails hard when the server doesn't support it — useful to catch
          "hub stopped working" regressions that auto would silently
          paper over. Note: the altool path runs tests WITHOUT an AL test
          runner codeunit — AI tests are unsupported and isolation comes
          from the RequiredTestIsolation property (default Codeunit).
        required: false
        type: string
        default: "auto"
      altool_version:
        description: >-
          Version of the Microsoft.Dynamics.BusinessCentral.Development.Tools
          dotnet tool used when test_runner=altool. Must be a version that
          ships the `runtests` command — as of 2026-06 that's only the 18.x
          prereleases (stable 17.x has publishapp but no runtests).
        required: false
        type: string
        default: "18.0.37.11445-beta"
      runner_image:
        description: "Override the bc-runner image (defaults to the public ghcr.io tag)"
        required: false
        type: string
        default: "ghcr.io/stefanmaron/msdyn365bc.on.linux/bc-runner:latest"
      bc_linux_ref:
        description: "Git ref of StefanMaron/MsDyn365Bc.On.Linux to check out for scripts (master, a tag, or a commit SHA)"
        required: false
        type: string
        default: "master"
      timeout_minutes:
        description: "Job timeout"
        required: false
        type: number
        default: 45

      # ─── Analyzer / ruleset configuration ──────────────────────────────
      # All optional. Default behavior is "no analyzers, no ruleset" — same
      # as before these inputs existed, so existing consumers see no change.
      # When ANY of these are set, the compile step calls
      # scripts/resolve-analyzers.py to turn them into AL compile flags
      # (/analyzer:, /ruleset:, /enableexternalrulesets). See
      # ANALYZER-SUPPORT-PLAN.md for the full design + gotchas.
      enable_code_cop:
        description: "Enable Microsoft CodeCop"
        required: false
        type: boolean
        default: false
      enable_ui_cop:
        description: "Enable Microsoft UICop"
        required: false
        type: boolean
        default: false
      enable_app_source_cop:
        description: "Enable Microsoft AppSourceCop"
        required: false
        type: boolean
        default: false
      enable_per_tenant_extension_cop:
        description: "Enable Microsoft PerTenantExtensionCop"
        required: false
        type: boolean
        default: false
      custom_code_cops:
        description: >-
          Comma- or newline-separated list of additional cop DLLs.
          Each entry is either a local path (relative to your repo) or an
          https:// URL. URLs are downloaded fresh per run; .nupkg URLs are
          unzipped and every DLL under lib/net8.0/ is added (so pointing
          at the ALCops.Analyzers nupkg release just works — all 7 cop
          DLLs + ALCops.Common.dll come along automatically).
        required: false
        type: string
        default: ""
      ruleset_file:
        description: >-
          Local path or https:// URL to a JSON ruleset file. Passed as
          /ruleset:. Note: AL compiler accepts JSON only, not Visual
          Studio's classic XML .ruleset format.
        required: false
        type: string
        default: ""
      enable_external_rulesets:
        description: >-
          When true, pass /enableexternalrulesets so the ruleset file can
          include remote rulesets via includedRuleSets[].path entries
          pointing at https:// URLs (e.g. shared org-wide rulesets in a
          public repo).
        required: false
        type: boolean
        default: false
      enable_code_analyzers_on_test_apps:
        description: >-
          When false (default — matches AL-Go's default), test app
          compiles skip the analyzer/ruleset flags entirely. Production
          apps still get them.
        required: false
        type: boolean
        default: false

    secrets:
      bc_license:
        description: >-
          Optional ISV/developer BC license, base64-encoded.
          When provided, the workflow decodes it to a tempfile in the runner
          workspace, mounts it into the bc-runner + sql containers, and the
          entrypoint imports it BEFORE NST starts — eliminating the legacy
          boot/import/restart cycle that ISVs would otherwise need.
          See README.md "Custom license" section in the bc-linux repo for
          how to prepare the secret and pass it from the caller workflow.
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      BC_RUNNER_IMAGE: ${{ inputs.runner_image }}
      BC_VERSION: ${{ inputs.bc_version }}
      BC_COUNTRY: ${{ inputs.bc_country }}
      BC_TYPE: ${{ inputs.bc_type }}

    steps:
      # ─── Phase 1: cheap parallel-friendly checkouts ──────────────────
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout MsDyn365Bc.On.Linux
        uses: actions/checkout@v4
        with:
          repository: StefanMaron/MsDyn365Bc.On.Linux
          ref: ${{ inputs.bc_linux_ref }}
          path: bc-linux

      - name: Initialize timing
        run: bash bc-linux/scripts/workflow-summary.sh init

      # ─── Phase 2: artifact download + docker image pull (parallel) ───
      # Downloading the BC artifact from Microsoft's CDN and pulling the
      # bc-runner / mssql images from GHCR / mcr are independent network
      # operations on different hosts. Run them in parallel inside one
      # shell step to overlap their wall time (~50s artifacts ⊕ ~30s pull
      # ⇒ ~50s instead of ~80s sequential).
      - name: Download BC artifacts + pull docker images (parallel)
        env:
          BC_RUNNER_IMAGE: ${{ inputs.runner_image }}
          BC_ARTIFACTS_DIR: ${{ github.workspace }}/artifact-cache/${{ inputs.bc_version }}
        run: |
          set -e
          bash bc-linux/scripts/workflow-summary.sh begin DOWNLOAD "Download BC artifacts + pull docker images"
          mkdir -p "artifact-cache/$BC_VERSION"
          (
            bc-linux/scripts/download-artifacts.sh \
              "$BC_TYPE" "$BC_VERSION" "$BC_COUNTRY" \
              "$PWD/artifact-cache/$BC_VERSION"
          ) &
          ARTIFACT_PID=$!
          (
            cd bc-linux
            # mcr.microsoft.com (mssql/server) is occasionally WAF-blocked
            # from GitHub runner IPs — short retry loop dodges that.
            for attempt in 1 2 3 4 5; do
              if docker compose pull --quiet; then break; fi
              echo "docker compose pull failed (attempt $attempt/5); retrying in 15s..."
              sleep 15
            done
          ) &
          PULL_PID=$!
          wait $ARTIFACT_PID || { echo "artifact download failed"; exit 1; }
          wait $PULL_PID     || { echo "docker pull failed"; exit 1; }
          bash bc-linux/scripts/workflow-summary.sh end DOWNLOAD

      # ─── Phase 3: figure out the BC_KEEP_APP_IDS for the entrypoint ──
      # Must run BEFORE 'docker compose up' so the env propagates into
      # the container's selective filter step at DB setup time.
      - name: Resolve apps to keep in BC database
        env:
          APP_DIRS: ${{ inputs.app_dirs }}
          TEST_APP_DIRS: ${{ inputs.test_app_dirs }}
        run: |
          bash bc-linux/scripts/workflow-summary.sh begin RESOLVE "Resolve apps to keep"
          # Walk the consumer's app.json files (production + test) AND
          # bc-linux's own custom Test Runner Extension app.json to find
          # their declared dependencies, then resolve the transitive
          # closure against the BC artifact extension set. The closure
          # is added to the 5 baseline application stack apps (System /
          # System Application / Business Foundation / Base Application /
          # Application umbrella).
          #
          # The TestRunnerExtension app.json is included so its declared
          # dependency on Microsoft Test Runner gets walked into the
          # closure. Without this, the selective filter would wipe
          # Microsoft Test Runner and the entrypoint's TestRunnerExtension
          # publish would fail with AL1024 — exactly the bug that broke
          # the bc-copilot-blueprint debugging session before this fix.
          ARGS="--app-json bc-linux/extensions/TestRunnerExtension/app.json"
          for d in $APP_DIRS $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            if [ -f "project/$d/app.json" ]; then
              ARGS="$ARGS --app-json project/$d/app.json"
            fi
          done
          KEEP_IDS=$(python3 bc-linux/scripts/resolve-keep-app-ids.py \
            $ARGS \
            --artifact-dir "artifact-cache/$BC_VERSION")
          echo "Resolved keep set: $KEEP_IDS"
          echo "BC_CLEAR_ALL_APPS=selective" >> "$GITHUB_ENV"
          echo "BC_KEEP_APP_IDS=$KEEP_IDS" >> "$GITHUB_ENV"
          bash bc-linux/scripts/workflow-summary.sh end RESOLVE

      # ─── Phase 3.5: stage the optional ISV license ───────────────────
      # When the consumer passed `bc_license` in the secrets: block, decode
      # the base64 blob to a tempfile and export the env vars that wire it
      # into the docker-compose mounts. The entrypoint will then import this
      # license INSTEAD of the default Cronus.bclicense, before NST starts —
      # no boot/import/restart cycle needed.
      #
      # We must NOT print the secret length, decoded path contents, or
      # anything else that could leak. Just write the file and propagate
      # the env vars.
      # We can NOT use `if: secrets.bc_license != ''` here — the `secrets`
      # context isn't allowed in step `if:` expressions (verified by
      # actionlint and confirmed by GitHub at parse time, which rejects
      # the entire workflow file). Reading the secret into env at step
      # level IS allowed, so we always run the step and skip its body
      # when the env var is empty. Same shape used in bc-test-prebuilt.yml.
      - name: Stage ISV license (if provided)
        env:
          BC_LICENSE_B64: ${{ secrets.bc_license }}
        run: |
          set -e
          if [ -z "${BC_LICENSE_B64:-}" ]; then
            echo "No bc_license secret provided — using default Cronus license"
            exit 0
          fi
          LICENSE_PATH="$RUNNER_TEMP/bc-license.bclicense"
          printf '%s' "$BC_LICENSE_B64" | base64 -d > "$LICENSE_PATH"
          if [ ! -s "$LICENSE_PATH" ]; then
            echo "ERROR: bc_license secret decoded to an empty file"
            exit 1
          fi
          # Make sure the SQL container's UID can read it (mssql runs as
          # uid 10001 by default; world-readable is the simplest thing
          # that works without messing with ownership).
          chmod 644 "$LICENSE_PATH"
          echo "BC_LICENSE_HOST_PATH=$LICENSE_PATH" >> "$GITHUB_ENV"
          echo "BC_LICENSE_FILE=/bc/custom-license.bclicense" >> "$GITHUB_ENV"
          echo "ISV license staged for entrypoint import"

      # ─── Phase 4: kick off BC startup in the background ──────────────
      # docker compose up -d returns immediately. BC then takes ~5 minutes
      # to fully boot. We do NOT wait for healthy here — instead the next
      # several steps (setup .NET, install AL, compile) run during that
      # boot window in parallel.
      - name: Start BC on Linux (background)
        env:
          BC_ARTIFACTS_DIR: ${{ github.workspace }}/artifact-cache/${{ inputs.bc_version }}
        working-directory: bc-linux
        run: |
          bash scripts/workflow-summary.sh begin BC_BOOT "BC startup (background → wait for healthy)"
          docker compose up -d
          echo "BC container started in background — continuing with other work."

      # ─── Phase 5: work that runs DURING BC's startup window ──────────
      # Setup .NET, install the AL compiler, stage symbols, and compile
      # the consumer's AL apps. None of these need BC to be responsive,
      # so they overlap with the slow `docker compose up` startup time.
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install AL compiler (Linux)
        run: |
          bash bc-linux/scripts/workflow-summary.sh begin AL_INSTALL "Install AL compiler"
          AL_TOOL="${{ inputs.al_tool_version }}"
          BC_MAJOR=$(echo "${{ inputs.bc_version }}" | cut -d. -f1)
          if [ -z "$AL_TOOL" ]; then
            case "$BC_MAJOR" in
              27) AL_TOOL="16.2.28.57946" ;;
              28) AL_TOOL="17.0.34.45391" ;;
              *)
                echo "::warning::bc_version major $BC_MAJOR is not in the al_tool lookup table — using fallback 16.2.28.57946"
                AL_TOOL="16.2.28.57946"
                ;;
            esac
          fi
          echo "Installing AL compiler $AL_TOOL"
          PKG="microsoft.dynamics.businesscentral.development.tools.linux"
          AL_TOOL_DIR=""

          # Try dotnet global tool first (BC 27 / v16 packages ship with
          # DotnetToolSettings.xml and install correctly this way).
          # BC 28+ dropped the tool manifest — the package is now a plain
          # library nupkg and `dotnet tool install` rejects it; fall through
          # to the nupkg-extraction path in that case.
          if dotnet tool install -g \
              Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux \
              --version "$AL_TOOL" 2>&1 \
          || dotnet tool update -g \
              Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux \
              --version "$AL_TOOL" 2>&1; then
            echo "Installed as dotnet global tool"
            echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
            AL_TOOL_DIR=$(find "$HOME/.dotnet/tools/.store/$PKG" \
              -type d -name "any" -path "*/tools/net8.0/any" 2>/dev/null \
              | sort | tail -1)
          else
            # Not a dotnet tool — download and extract the nupkg directly.
            echo "Package is not a dotnet global tool; extracting nupkg"
            EXTRACT_DIR="$HOME/.al-tool-cache/$AL_TOOL"
            mkdir -p "$EXTRACT_DIR"
            curl -fsSL \
              "https://api.nuget.org/v3-flatcontainer/${PKG}/${AL_TOOL}/${PKG}.${AL_TOOL}.nupkg" \
              -o "$EXTRACT_DIR/pkg.zip"
            unzip -q -o "$EXTRACT_DIR/pkg.zip" -d "$EXTRACT_DIR"
            rm "$EXTRACT_DIR/pkg.zip"
            # Prefer dotnet tool layout (tools/net8.0/any); fall back to lib/net8.0
            if [ -d "$EXTRACT_DIR/tools/net8.0/any" ]; then
              AL_TOOL_DIR="$EXTRACT_DIR/tools/net8.0/any"
            else
              AL_TOOL_DIR="$EXTRACT_DIR/lib/net8.0"
            fi
            chmod +x "$AL_TOOL_DIR/alc" 2>/dev/null || true
            # Create an AL wrapper so `AL compile ...` works in later steps.
            # The v16 dotnet tool ships AL.dll which routes the `compile`
            # subcommand; raw alc doesn't accept it — strip it here.
            mkdir -p "$HOME/.al-bin"
            printf '#!/bin/bash\n[ "$1" = compile ] && shift\nexec "%s/alc" "$@"\n' \
              "$AL_TOOL_DIR" > "$HOME/.al-bin/AL"
            chmod +x "$HOME/.al-bin/AL"
            echo "$HOME/.al-bin" >> "$GITHUB_PATH"
          fi

          echo "AL_TOOL_DIR=$AL_TOOL_DIR" >> "$GITHUB_ENV"
          echo "AL compiler ready: $AL_TOOL_DIR"
          bash bc-linux/scripts/workflow-summary.sh end AL_INSTALL

      # ─── altool test runner (BC 28+) ─────────────────────────────────
      # Installs the cross-platform Microsoft.Dynamics.BusinessCentral.
      # Development.Tools dotnet tool whose `al runtests` command drives
      # the NST's built-in /dev/TestRunnerHub SignalR hub. This is a
      # DIFFERENT package from the .Linux compiler package above (that one
      # only compiles). The hub requires Dev API 7.0, which only ships
      # with BC 28.0+:
      #   - test_runner=altool on an older version → hard error here
      #     (forcing altool is the "catch hub regressions" mode)
      #   - test_runner=auto on an older version → skip the install; the
      #     run step's live probe will route to the websocket runner
      - name: Install AL dotnet tool (altool test runner)
        if: inputs.test_runner != 'websocket'
        run: |
          set -e
          BC_MAJOR=$(echo "${{ inputs.bc_version }}" | cut -d. -f1)
          if [ "$BC_MAJOR" -lt 28 ]; then
            if [ "${{ inputs.test_runner }}" = "altool" ]; then
              echo "ERROR: test_runner=altool requires BC 28.0+ — the server-side"
              echo "       /dev/TestRunnerHub (Dev API 7.0) does not exist in BC ${BC_MAJOR}.x."
              echo "       Use test_runner=auto (probes + falls back) or websocket."
              exit 1
            fi
            echo "test_runner=auto on BC ${BC_MAJOR}.x — skipping altool install;"
            echo "tests will use the websocket runner."
            exit 0
          fi
          dotnet tool install -g Microsoft.Dynamics.BusinessCentral.Development.Tools \
            --version "${{ inputs.altool_version }}" \
          || dotnet tool update -g Microsoft.Dynamics.BusinessCentral.Development.Tools \
            --version "${{ inputs.altool_version }}"
          # The tool registers the lowercase `al` command. The AL compiler
          # install step above may create an UPPERCASE `AL` wrapper for the
          # compile path — the test step invokes this one by absolute path
          # ($HOME/.dotnet/tools/al) so there's no case-collision ambiguity.
          "$HOME/.dotnet/tools/al" runtests --help >/dev/null
          echo "altool test runner ready: $("$HOME/.dotnet/tools/al" --version)"

      - name: Stage symbols from BC artifacts
        env:
          APP_DIRS: ${{ inputs.app_dirs }}
          TEST_APP_DIRS: ${{ inputs.test_app_dirs }}
        run: |
          bash bc-linux/scripts/workflow-summary.sh begin SYMBOLS "Stage symbols"
          mkdir -p symbols
          # Manifest-driven resolver: walks the artifact tree, indexes
          # every .app by its declared id, then stages exactly the
          # transitive dependency closure of the consumer's app.json
          # files (plus System.app, which AL compile always needs).
          # Robust to Microsoft moving apps between folders across BC
          # versions — the old glob-based staging silently failed
          # whenever an expected app moved (e.g. Tests-TestLibraries
          # under platform/applications/BaseApp/Test/ in BC 27.5).
          ARGS=""
          for d in $APP_DIRS $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            [ -f "project/$d/app.json" ] && ARGS="$ARGS --app-json project/$d/app.json"
          done
          python3 bc-linux/scripts/stage-symbols.py \
            $ARGS \
            --artifact-dir "artifact-cache/$BC_VERSION" \
            --out-dir symbols \
            || true   # warnings about unresolved deps are non-fatal; AL compile gives the precise error if any
          echo "Staged $(ls symbols/*.app 2>/dev/null | wc -l) symbol files"
          bash bc-linux/scripts/workflow-summary.sh end SYMBOLS

      - name: Patch app.json runtime
        env:
          APP_DIRS: ${{ inputs.app_dirs }}
          TEST_APP_DIRS: ${{ inputs.test_app_dirs }}
          RUNTIME_VERSION: ${{ inputs.runtime_version }}
        run: |
          EFFECTIVE_RUNTIME="$RUNTIME_VERSION"
          BC_MAJOR=$(echo "${{ inputs.bc_version }}" | cut -d. -f1)
          if [ -z "$EFFECTIVE_RUNTIME" ]; then
            case "$BC_MAJOR" in
              27) EFFECTIVE_RUNTIME="16.0" ;;
              28) EFFECTIVE_RUNTIME="17.0" ;;
              *)
                echo "::warning::bc_version major $BC_MAJOR is not in the runtime lookup table — using fallback 14.0"
                EFFECTIVE_RUNTIME="14.0"
                ;;
            esac
          fi
          echo "Patching app.json runtime → $EFFECTIVE_RUNTIME"
          for d in $APP_DIRS $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            F="project/$d/app.json"
            [ -f "$F" ] || continue
            python3 - "$F" "$EFFECTIVE_RUNTIME" <<'PYEOF'
          import sys, json, pathlib
          p = pathlib.Path(sys.argv[1])
          d = json.loads(p.read_text())
          if d.get("runtime") != sys.argv[2]:
              d["runtime"] = sys.argv[2]
              p.write_text(json.dumps(d, indent=2) + "\n")
              print(f"  patched {p}: runtime → {sys.argv[2]}")
          else:
              print(f"  {p}: runtime already {sys.argv[2]}, skip")
          PYEOF
          done

      - name: Compile AL apps (no publish yet)
        env:
          APP_DIRS: ${{ inputs.app_dirs }}
          TEST_APP_DIRS: ${{ inputs.test_app_dirs }}
          ENABLE_CODE_COP: ${{ inputs.enable_code_cop }}
          ENABLE_UI_COP: ${{ inputs.enable_ui_cop }}
          ENABLE_APP_SOURCE_COP: ${{ inputs.enable_app_source_cop }}
          ENABLE_PER_TENANT_EXTENSION_COP: ${{ inputs.enable_per_tenant_extension_cop }}
          CUSTOM_CODE_COPS: ${{ inputs.custom_code_cops }}
          RULESET_FILE: ${{ inputs.ruleset_file }}
          ENABLE_EXTERNAL_RULESETS: ${{ inputs.enable_external_rulesets }}
          ENABLE_CODE_ANALYZERS_ON_TEST_APPS: ${{ inputs.enable_code_analyzers_on_test_apps }}
          PREPROCESSOR_SYMBOLS: ${{ inputs.preprocessor_symbols }}
        run: |
          set -e
          bash bc-linux/scripts/workflow-summary.sh begin COMPILE "Compile AL apps"

          # ─── Resolve analyzer flags via the helper ─────────────────────
          # Build the helper invocation only when SOMETHING is configured.
          # When nothing is set, ANALYZER_FLAGS stays empty and the compile
          # commands run exactly as they did before these inputs existed.
          HELPER_ARGS=()
          [ "$ENABLE_CODE_COP" = "true" ] && HELPER_ARGS+=(--enable-code-cop)
          [ "$ENABLE_UI_COP" = "true" ] && HELPER_ARGS+=(--enable-ui-cop)
          [ "$ENABLE_APP_SOURCE_COP" = "true" ] && HELPER_ARGS+=(--enable-app-source-cop)
          [ "$ENABLE_PER_TENANT_EXTENSION_COP" = "true" ] && HELPER_ARGS+=(--enable-per-tenant-extension-cop)
          [ -n "$CUSTOM_CODE_COPS" ] && HELPER_ARGS+=(--custom-code-cops "$CUSTOM_CODE_COPS")
          [ -n "$RULESET_FILE" ] && HELPER_ARGS+=(--ruleset-file "$RULESET_FILE")
          [ "$ENABLE_EXTERNAL_RULESETS" = "true" ] && HELPER_ARGS+=(--enable-external-rulesets)

          # Run the helper to a tempfile rather than via process substitution.
          # `mapfile -t < <(python3 ...)` SILENTLY SWALLOWS the helper's exit
          # code — if the helper bails on a missing path or download error,
          # mapfile just gets an empty array, ANALYZER_FLAGS stays empty, the
          # compile runs WITHOUT any cops, and the workflow reports a green
          # build with zero analyzer enforcement. Exactly the false-green
          # failure mode the load-failure guard is supposed to prevent —
          # but the load-failure guard only fires DURING compile, so a
          # helper crash BEFORE compile slips past it.
          # The pass --project-root project so consumer-supplied paths
          # (which are written relative to their repo root) get prepended
          # with the project/ checkout dir. URLs pass through untouched.
          ANALYZER_FLAGS=()
          if [ ${#HELPER_ARGS[@]} -gt 0 ]; then
            HELPER_OUT=$(mktemp)
            if ! python3 bc-linux/scripts/resolve-analyzers.py \
                --project-root project \
                ${AL_TOOL_DIR:+--al-tool-dir "$AL_TOOL_DIR"} \
                "${HELPER_ARGS[@]}" > "$HELPER_OUT"; then
              echo "ERROR: resolve-analyzers.py failed — check stderr above" >&2
              rm -f "$HELPER_OUT"
              exit 1
            fi
            mapfile -t ANALYZER_FLAGS < "$HELPER_OUT"
            rm -f "$HELPER_OUT"
            echo "Analyzer flags: ${ANALYZER_FLAGS[*]}"
          else
            echo "No analyzers configured — compiling without /analyzer or /ruleset flags."
          fi

          # Pattern that catches every "analyzer DLL didn't load properly"
          # failure mode the AL compiler reports. These are emitted as
          # WARNINGS (AD0001 specifically) so AL compile still exits 0
          # — without this guard, a misconfigured analyzer would silently
          # disable itself and the workflow would report a green build
          # with no cops enforced. Failing here is the only way the
          # consumer learns their cop wiring is broken.
          ANALYZER_LOAD_FAIL_PATTERN='AD0001|Could not load|BadImageFormatException|PlatformNotSupportedException'

          PP_FLAG=()
          [ -n "$PREPROCESSOR_SYMBOLS" ] && PP_FLAG=("/define:$PREPROCESSOR_SYMBOLS")

          compile_dir() {
            local src="$1"
            shift
            [ -f "$src/app.json" ] || { echo "skip $src (no app.json)" >&2; return 0; }
            mkdir -p "$src/.alpackages"
            cp symbols/*.app "$src/.alpackages/" 2>/dev/null || true
            local out
            out="$(pwd)/build/$(basename "$src").app"
            mkdir -p build
            echo ">>> Compiling $src → $out"
            # Remaining args ($@) are the analyzer flag fragments — may be empty.
            # When analyzers are configured, capture output so we can grep
            # for load failures after the compile succeeds. When not, let
            # AL compile write straight to stdout/stderr (cheaper, simpler
            # output, same behavior as before this feature existed).
            if [ "$#" -gt 0 ]; then
              local tmplog rc
              tmplog=$(mktemp)
              AL compile "/project:$src" "/packagecachepath:$src/.alpackages" "/out:$out" "${PP_FLAG[@]}" "$@" 2>&1 | tee "$tmplog"
              # tee always exits 0; capture AL compile's real exit code.
              rc=${PIPESTATUS[0]}
              if [ "$rc" -ne 0 ]; then
                rm -f "$tmplog"
                return $rc
              fi
              if grep -qE "$ANALYZER_LOAD_FAIL_PATTERN" "$tmplog"; then
                echo "ERROR: analyzer load failure detected in compile output for $src" >&2
                echo "       (cop DLL did not initialize correctly — see lines below)" >&2
                grep -E "$ANALYZER_LOAD_FAIL_PATTERN" "$tmplog" >&2
                rm -f "$tmplog"
                return 1
              fi
              rm -f "$tmplog"
            else
              AL compile "/project:$src" "/packagecachepath:$src/.alpackages" "/out:$out" "${PP_FLAG[@]}"
            fi
          }

          # Compile production apps first so test apps can resolve them as deps.
          # Production apps always get the analyzer flags (when configured).
          for d in $APP_DIRS; do
            [ -z "$d" ] && continue
            compile_dir "project/$d" "${ANALYZER_FLAGS[@]}"
          done

          # Test apps get analyzer flags only when explicitly opted in via
          # enable_code_analyzers_on_test_apps. AL-Go's default is false
          # (analyzers don't run on test apps) and we mirror that so the
          # behavior matches what consumers see today.
          for d in $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            mkdir -p "project/$d/.alpackages"
            cp build/*.app "project/$d/.alpackages/" 2>/dev/null || true
            if [ "$ENABLE_CODE_ANALYZERS_ON_TEST_APPS" = "true" ]; then
              compile_dir "project/$d" "${ANALYZER_FLAGS[@]}"
            else
              compile_dir "project/$d"
            fi
          done

          bash bc-linux/scripts/workflow-summary.sh end COMPILE

      # ─── Phase 6: synchronization point — wait for BC to be healthy ──
      - name: Wait for BC healthy
        working-directory: bc-linux
        run: |
          ./scripts/wait-for-bc-healthy.sh 30
          bash scripts/workflow-summary.sh end BC_BOOT

      # ─── Phase 7: publish compiled apps to the now-running BC ────────
      - name: Publish AL apps to BC
        env:
          AUTH: "BCRUNNER:Admin123!"
          DEV: "http://localhost:7049/BC/dev"
          APP_DIRS: ${{ inputs.app_dirs }}
          TEST_APP_DIRS: ${{ inputs.test_app_dirs }}
        run: |
          set -e
          bash bc-linux/scripts/workflow-summary.sh begin PUBLISH "Publish AL apps"
          # Source the canonical publish helper from bc-linux. Previously
          # this step had its own inline publish_app that treated EVERY
          # 422 as success, which silently swallowed missing-dependency
          # errors (e.g. AL1024 "Symbols for the requested app X could
          # not be found in the database") and let downstream test runs
          # produce "0 total, 0 passed, 0 failed" with no clue why.
          # bc_publish_app reads the response body and only treats 422
          # as success if it actually says "already".
          # shellcheck disable=SC1091
          . bc-linux/scripts/publish-app.sh
          PUBLISHED_COUNT=0
          for d in $APP_DIRS $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            app="build/$(basename "$d").app"
            [ -f "$app" ] || { echo "missing: $app"; exit 1; }
            echo ">>> Publishing $app"
            bc_publish_app "$app" "$DEV" "$AUTH" || exit 1
            PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1))
          done
          bash bc-linux/scripts/workflow-summary.sh count apps_published "$PUBLISHED_COUNT"
          # Track compile count too — same loop iteration shape, runs after compile.
          COMPILED_COUNT=$(ls build/*.app 2>/dev/null | wc -l)
          bash bc-linux/scripts/workflow-summary.sh count apps_compiled "$COMPILED_COUNT"
          bash bc-linux/scripts/workflow-summary.sh end PUBLISH

      - name: Run AL tests
        working-directory: bc-linux
        env:
          TEST_APP_DIRS: ${{ inputs.test_app_dirs }}
        run: |
          set -e
          bash scripts/workflow-summary.sh begin TESTS "Run AL tests"
          # Iterate only the test apps (we know which ones from TEST_APP_DIRS).
          # Production apps in APP_DIRS are already published but their .app
          # files aren't fed to run-tests.sh because they have no test codeunits.
          TESTS_TOTAL=0
          TESTS_PASSED=0
          TESTS_FAILED=0
          CODEUNITS_TOTAL=0
          # NOTE on the pipe: `run-tests.sh ... | tee` hides run-tests.sh's
          # exit code behind tee's (always 0). PIPESTATUS captures the
          # original. Without this check, even a hard publish failure or
          # an empty test suite leaves the workflow green — which is
          # exactly the bug that wasted multiple debugging cycles in the
          # bc-copilot-blueprint session.
          ANY_TEST_FAILED=0
          # ─── Select the effective test runner ─────────────────────────
          # "auto" probes the LIVE server (BC is healthy at this point):
          # GET /dev/metadata must advertise Dev API 7.0+ for the
          # TestRunnerHub to exist, AND the al tool must have been
          # installed (the install step skips it on BC < 28). Anything
          # short of both → websocket. Explicit values pass through:
          # "altool" without server support fails inside the script with
          # a clear error instead of silently degrading.
          EFFECTIVE_RUNNER="${{ inputs.test_runner }}"
          if [ "$EFFECTIVE_RUNNER" = "auto" ]; then
            if [ -x "$HOME/.dotnet/tools/al" ] \
               && python3 scripts/run-tests-altool.py --probe; then
              EFFECTIVE_RUNNER="altool"
              echo "auto: server supports the TestRunnerHub — using the altool runner"
            else
              EFFECTIVE_RUNNER="websocket"
              echo "auto: TestRunnerHub not available — using the websocket runner"
            fi
          fi
          # Per-app JUnit XML output. Always emitted (no opt-in flag) — JUnit is
          # cheap, the file is small, and downstream consumers either ingest it
          # via the upload-artifact step below OR via their own steps that read
          # the workspace path. AL-Go's AnalyzeTests post-step looks for these
          # files at consumer-controlled paths, so we put them somewhere
          # predictable: ../build/junit-<test-app-basename>.xml relative to
          # the bc-linux working dir (= ./build/junit-* relative to the
          # consumer's repo root after the workflow finishes).
          mkdir -p ../build
          for d in $TEST_APP_DIRS; do
            [ -z "$d" ] && continue
            app="../build/$(basename "$d").app"
            [ -f "$app" ] || { echo "skip: $app (not built)"; continue; }
            base=$(basename "$app")
            junit_file="../build/junit-$(basename "$d").xml"
            echo "=== Running tests in $base ==="
            # Capture output so we can parse the totals for telemetry.
            tmplog=$(mktemp)
            if [ "$EFFECTIVE_RUNNER" = "altool" ]; then
              # BC 28+: native `al runtests` against the NST's
              # /dev/TestRunnerHub. The script prints the same
              # "N total, P passed, F failed" and "Test codeunits:" lines
              # as run-tests.sh, so the parsing below works for both.
              python3 scripts/run-tests-altool.py \
                --app "$app" \
                --codeunit-range "${{ inputs.codeunit_range }}" \
                --junit-output "$junit_file" \
                --altool-cmd "$HOME/.dotnet/tools/al" \
                --timeout 30 2>&1 | tee "$tmplog"
            else
              ./scripts/run-tests.sh \
                --app "$app" \
                --codeunit-range "${{ inputs.codeunit_range }}" \
                --junit-output "$junit_file" \
                --timeout 30 2>&1 | tee "$tmplog"
            fi
            RUN_TESTS_RC=${PIPESTATUS[0]}
            if [ "$RUN_TESTS_RC" -ne 0 ]; then
              echo "ERROR: run-tests.sh exited with code $RUN_TESTS_RC for $base"
              ANY_TEST_FAILED=1
            fi
            # Parse "N total, P passed, F failed, ..." from run-tests.sh output.
            line=$(grep -oE '[0-9]+ total, [0-9]+ passed, [0-9]+ failed' "$tmplog" | tail -1 || true)
            if [ -n "$line" ]; then
              t=$(echo "$line" | grep -oE '^[0-9]+')
              p=$(echo "$line" | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+')
              f=$(echo "$line" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+')
              TESTS_TOTAL=$((TESTS_TOTAL + ${t:-0}))
              TESTS_PASSED=$((TESTS_PASSED + ${p:-0}))
              TESTS_FAILED=$((TESTS_FAILED + ${f:-0}))
            fi
            cu=$(grep -oE 'Test codeunits: [^ ]+' "$tmplog" | head -1 | sed 's/Test codeunits: //')
            if [ -n "$cu" ]; then
              n=$(echo "$cu" | tr ',' '\n' | grep -c .)
              CODEUNITS_TOTAL=$((CODEUNITS_TOTAL + n))
            fi
            rm -f "$tmplog"
          done
          bash scripts/workflow-summary.sh count tests_total    "$TESTS_TOTAL"
          bash scripts/workflow-summary.sh count tests_passed   "$TESTS_PASSED"
          bash scripts/workflow-summary.sh count tests_failed   "$TESTS_FAILED"
          bash scripts/workflow-summary.sh count codeunits_total "$CODEUNITS_TOTAL"
          bash scripts/workflow-summary.sh end TESTS
          # Propagate any non-zero exit from run-tests.sh (PIPESTATUS check
          # above), AND any test failures parsed from the per-app output.
          # Either condition fails the workflow.
          if [ "$ANY_TEST_FAILED" -ne 0 ]; then
            echo "ERROR: at least one run-tests.sh invocation exited non-zero"
            exit 1
          fi
          if [ "$TESTS_FAILED" -gt 0 ]; then
            echo "ERROR: $TESTS_FAILED test(s) failed"
            exit 1
          fi
          if [ "$TESTS_TOTAL" -eq 0 ]; then
            echo "ERROR: no tests ran (TESTS_TOTAL=0). Either the test app"
            echo "       failed to install or the test framework didn't see"
            echo "       any [Test] procedures."
            exit 1
          fi

      # Upload per-app JUnit XML as a workflow artifact even on test failure
      # (if: always()). Consumers can:
      #   - Download from the run summary page for offline inspection
      #   - Pull it from another job in the same workflow via actions/download-artifact
      #   - Feed it to dorny/test-reporter or EnricoMi/publish-unit-test-result-action
      #     in a follow-up step on their side (we don't auto-publish to GitHub
      #     Checks here because each consumer may want a different reporter
      #     UX or none at all)
      #
      # Name MUST include bc_version because actions/upload-artifact@v4 errors
      # if multiple matrix jobs in the same workflow run try to upload to the
      # same artifact name. test-versions.yml's matrix calls this reusable
      # workflow once per BC version; without the suffix every job after the
      # first one would fail with "409 Conflict".
      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results-${{ inputs.bc_version }}
          path: build/junit-*.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Workflow timing summary + telemetry
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          # Opt out of anonymous performance telemetry by setting this to "true"
          # in your workflow's env block. Default is to send (helps build the
          # case for native Linux BC support to Microsoft).
          BC_TELEMETRY_OPT_OUT: ${{ vars.BC_TELEMETRY_OPT_OUT || 'false' }}
        run: bash bc-linux/scripts/workflow-summary.sh emit

      - name: BC logs (on failure)
        if: failure()
        working-directory: bc-linux
        run: |
          echo "=== entrypoint.sh + selective filter output ==="
          docker compose logs bc 2>&1 | grep -E "\[entrypoint\]|Selective|KEEP:|BC_CLEAR_ALL_APPS|BC_KEEP_APP_IDS|test framework|Library Assert|Microsoft_Any|Microsoft_Test Runner" || true
          echo ""
          echo "=== last 500 lines of bc-1 ==="
          docker compose logs bc 2>&1 | tail -500
