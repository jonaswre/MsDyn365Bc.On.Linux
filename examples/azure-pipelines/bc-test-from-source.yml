# Azure DevOps pipeline for running AL tests on a Business Central
# container. Compiles your AL source (app + test apps) inside the pipeline
# and publishes the compiled .app files to BC.
#
# Powered by the Business Central container runtime — exposes the standard
# Business Central container network surface from a hosted runner.
# Image: ghcr.io/jonaswre/msdyn365bc.on.linux/bc-runner:latest (public).
#
# ──────────────────────────────────────────────────────────────────────
# HOW TO USE
# ──────────────────────────────────────────────────────────────────────
# 1. Copy this file into your repo as azure-pipelines.yml (or any name —
#    set it as the YAML file in your Azure DevOps Pipeline definition).
# 2. Edit the values in the "variables:" block to match your repo:
#      - BC_VERSION / BC_COUNTRY     → which BC version to test against
#      - APP_DIRS                    → space-separated dirs with app.json
#                                      for your production app(s).
#                                      Leave empty if you only have test apps.
#      - TEST_APP_DIRS               → space-separated dirs with app.json
#                                      for your test app(s)
#      - CODEUNIT_RANGE              → ID range of your TEST codeunits to
#                                      execute. Production codeunits in
#                                      APP_DIRS are published but not run.
# 3. Save + run. The pipeline runs on every push to main and PR.
#
# Requires a Microsoft-hosted Ubuntu agent (default `ubuntu-latest`) which
# already has Docker, Docker Compose, .NET 8 SDK, and curl preinstalled.
# ──────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include: [main, master]

pr:
  branches:
    include: [main, master]

pool:
  vmImage: 'ubuntu-latest'

variables:
  # ----- Edit these for your project ----------------------------------
  BC_VERSION: 'latest'
  BC_COUNTRY: 'w1'
  BC_TYPE: 'onprem'
  BC_USERNAME: 'bcrunner'
  BC_PASSWORD: 'replace-with-a-strong-password'
  SA_PASSWORD: 'replace-with-a-strong-sql-password'
  BC_INCLUDE_TEST_TOOLKIT: 'true'
  BC_ENABLE_CI_SQL_TUNING: 'true'
  BC_DEV_SERVICES_ENABLED: 'true'
  BC_MANAGEMENT_SERVICES_ENABLED: 'true'
  BC_MANAGEMENT_API_SERVICES_ENABLED: 'true'
  BC_TEST_AUTOMATION_ENABLED: 'true'
  BC_ALLOW_INSECURE_AUTH_BYPASS: 'true'

  # Space-separated dirs containing app.json for your production AL apps.
  # Leave empty ('') if your repo only has test apps.
  APP_DIRS: 'app'

  # Space-separated dirs containing app.json for your test AL apps.
  TEST_APP_DIRS: 'test'

  # IDs of your TEST codeunits to execute. APP_DIRS are published but
  # their codeunits aren't run — only TEST_APP_DIRS codeunits are executed.
  #
  # Accepted formats:
  #   '50000..99999'                       single AL range
  #   '50000..50100|130450..130459'        multiple ranges (pipe-separated)
  #   '50000,50001,50002'                  explicit ids
  #   '50000..50100,130450,200000..210000' mixed
  CODEUNIT_RANGE: '50000..99999'


  # AL compiler tool version. Leave blank to auto-derive from BC_VERSION
  # (recommended): BC 27.x → 16.2.28.57946, BC 28.x → 17.0.34.45391.
  # Set explicitly to pin a specific version.
  AL_TOOL_VERSION: ''

  # AL runtime version written into all app.json files before compile.
  # Auto-derived from BC_VERSION when blank: BC 27 → 16.0, BC 28 → 17.0.
  RUNTIME_VERSION: ''

  # Comma-separated preprocessor symbols passed to /define.
  # Example: 'BC27PLUS,BC28PLUS' for a version-gated matrix leg.
  PREPROCESSOR_SYMBOLS: ''

  # ─── Optional: analyzers + ruleset ───────────────────────────────────
  # All off by default. Set to 'true' / fill in to enable. The compile
  # step fails the pipeline if any cop DLL fails to load (AD0001,
  # 'Could not load', BadImageFormatException, PlatformNotSupportedException),
  # so a misconfigured cop can never produce a silently green build.
  # See ANALYZER-SUPPORT-PLAN.md in the runtime repo for the gotchas.
  ENABLE_CODE_COP: 'false'
  ENABLE_UI_COP: 'false'
  ENABLE_APP_SOURCE_COP: 'false'
  ENABLE_PER_TENANT_EXTENSION_COP: 'false'
  # Comma- or newline-separated list of additional cop DLLs. Each entry
  # is either a local path or an https:// URL. .nupkg URLs are unzipped
  # and every DLL under lib/net8.0/ is added — pointing at the ALCops
  # release nupkg makes all 7 cops + ALCops.Common.dll come along
  # automatically. Example:
  #   'https://github.com/ALCops/Analyzers/releases/download/v0.6.1/ALCops.Analyzers.0.6.1.nupkg'
  CUSTOM_CODE_COPS: ''
  # JSON ruleset (NOT the classic VS XML .ruleset format). Local repo
  # path or https:// URL.
  RULESET_FILE: ''
  # Set to 'true' if RULESET_FILE has includedRuleSets[].path entries
  # pointing at https:// URLs (e.g. shared org-wide rulesets in a public
  # repo). Required by the AL compiler for any URL-scheme include.
  ENABLE_EXTERNAL_RULESETS: 'false'
  # Mirror AL-Go's default: analyzers don't run on test apps. Set to
  # 'true' to enforce cops on test apps too.
  ENABLE_CODE_ANALYZERS_ON_TEST_APPS: 'false'
  # --------------------------------------------------------------------

  # Business Central runner image (publicly available on GHCR — no auth needed).
  BC_RUNNER_IMAGE: 'ghcr.io/jonaswre/msdyn365bc.on.linux/bc-runner:latest'

  # Git ref of the Business Central container runtime to use for scripts.
  BC_RUNTIME_REF: 'master'

steps:
  - checkout: self
    path: project

  - bash: |
      set -e
      RUNTIME_REF="${BC_RUNTIME_REF:-master}"
      git clone --depth 1 --branch "$RUNTIME_REF" \
        https://github.com/jonaswre/MsDyn365Bc.On.Linux.git \
        "$(Agent.BuildDirectory)/bc-runtime"
      ls "$(Agent.BuildDirectory)/bc-runtime"
    displayName: 'Clone Business Central runtime'

  - bash: bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" init
    displayName: 'Initialize timing'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" begin DOWNLOAD "Download BC artifacts + pull docker images"
      mkdir -p "$(Pipeline.Workspace)/artifact-cache/$(BC_VERSION)"
      (
        "$(Agent.BuildDirectory)/bc-runtime/scripts/download-artifacts.sh" \
          "$(BC_TYPE)" "$(BC_VERSION)" "$(BC_COUNTRY)" \
          "$(Pipeline.Workspace)/artifact-cache/$(BC_VERSION)"
      ) &
      ARTIFACT_PID=$!
      (
        cd "$(Agent.BuildDirectory)/bc-runtime"
        for attempt in 1 2 3 4 5; do
          if docker compose pull --quiet; then break; fi
          echo "docker compose pull failed (attempt $attempt/5); retrying in 15s..."
          sleep 15
        done
      ) &
      PULL_PID=$!
      wait $ARTIFACT_PID || { echo "artifact download failed"; exit 1; }
      wait $PULL_PID     || { echo "docker pull failed"; exit 1; }
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" end DOWNLOAD
    displayName: 'Download BC artifacts + pull docker images (parallel)'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" begin RESOLVE "Resolve apps to keep"
      ARGS=""
      cd "$(Pipeline.Workspace)/project"
      for d in $(APP_DIRS) $(TEST_APP_DIRS); do
        [ -z "$d" ] && continue
        [ -f "$d/app.json" ] && ARGS="$ARGS --app-json $d/app.json"
      done
      KEEP_IDS=$(python3 "$(Agent.BuildDirectory)/bc-runtime/scripts/resolve-keep-app-ids.py" \
        $ARGS \
        --artifact-dir "$(Pipeline.Workspace)/artifact-cache/$(BC_VERSION)")
      echo "Resolved keep set: $KEEP_IDS"
      echo "##vso[task.setvariable variable=BC_CLEAR_ALL_APPS]selective"
      echo "##vso[task.setvariable variable=BC_KEEP_APP_IDS]$KEEP_IDS"
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" end RESOLVE
    displayName: 'Resolve apps to keep in BC database'

  # Optional: stage an ISV/developer license. Without this step BC boots
  # with the public Cronus license. To use your own license, store its
  # base64-encoded content in the variable group as BC_LICENSE_B64 and
  # mark it as a secret. The entrypoint imports the license BEFORE NST
  # starts, so no boot/import/restart cycle is needed. No-op when unset.
  - bash: |
      set -e
      if [ -z "${BC_LICENSE_B64:-}" ]; then
        echo "BC_LICENSE_B64 not set; skipping (default Cronus license will be used)"
        exit 0
      fi
      LICENSE_PATH="$(Agent.TempDirectory)/bc-license.bclicense"
      printf '%s' "$BC_LICENSE_B64" | base64 -d > "$LICENSE_PATH"
      [ -s "$LICENSE_PATH" ] || { echo "ERROR: BC_LICENSE_B64 decoded to an empty file"; exit 1; }
      chmod 644 "$LICENSE_PATH"
      echo "##vso[task.setvariable variable=BC_LICENSE_HOST_PATH]$LICENSE_PATH"
      echo "##vso[task.setvariable variable=BC_LICENSE_FILE]/bc/custom-license.bclicense"
    env:
      BC_LICENSE_B64: $(BC_LICENSE_B64)
    displayName: 'Stage ISV license (if BC_LICENSE_B64 is set)'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" begin BC_BOOT "BC startup (background → wait for healthy)"
      cd "$(Agent.BuildDirectory)/bc-runtime"
      export BC_ARTIFACTS_DIR="$(Pipeline.Workspace)/artifact-cache/$(BC_VERSION)"
      export BC_VERSION="$(BC_VERSION)"
      export BC_COUNTRY="$(BC_COUNTRY)"
      export BC_TYPE="$(BC_TYPE)"
      export BC_USERNAME="$(BC_USERNAME)"
      export BC_PASSWORD="$(BC_PASSWORD)"
      export SA_PASSWORD="$(SA_PASSWORD)"
      export BC_INCLUDE_TEST_TOOLKIT="$(BC_INCLUDE_TEST_TOOLKIT)"
      export BC_ENABLE_CI_SQL_TUNING="$(BC_ENABLE_CI_SQL_TUNING)"
      export BC_DEV_SERVICES_ENABLED="$(BC_DEV_SERVICES_ENABLED)"
      export BC_MANAGEMENT_SERVICES_ENABLED="$(BC_MANAGEMENT_SERVICES_ENABLED)"
      export BC_MANAGEMENT_API_SERVICES_ENABLED="$(BC_MANAGEMENT_API_SERVICES_ENABLED)"
      export BC_TEST_AUTOMATION_ENABLED="$(BC_TEST_AUTOMATION_ENABLED)"
      export BC_ALLOW_INSECURE_AUTH_BYPASS="$(BC_ALLOW_INSECURE_AUTH_BYPASS)"
      export BC_RUNNER_IMAGE="$(BC_RUNNER_IMAGE)"
      export BC_CLEAR_ALL_APPS="$(BC_CLEAR_ALL_APPS)"
      export BC_KEEP_APP_IDS="$(BC_KEEP_APP_IDS)"
      # ISV license overrides (set by the previous step when BC_LICENSE_B64
      # is provided as a secret variable). Empty/unset = default Cronus.
      export BC_LICENSE_HOST_PATH="${BC_LICENSE_HOST_PATH:-}"
      export BC_LICENSE_FILE="${BC_LICENSE_FILE:-}"
      docker compose up -d
      echo "BC container started in background — continuing with other work."
    displayName: 'Start Business Central container (background)'

  - task: UseDotNet@2
    displayName: 'Install .NET 8 SDK'
    inputs:
      packageType: 'sdk'
      version: '8.0.x'

  - bash: |
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" begin AL_INSTALL "Install AL compiler"
      TOOL="$(AL_TOOL_VERSION)"
      BC_MAJOR=$(echo "$(BC_VERSION)" | cut -d. -f1)
      if [ -z "$TOOL" ]; then
        case "$BC_MAJOR" in
          27) TOOL="16.2.28.57946" ;;
          28) TOOL="17.0.34.45391" ;;
          *)
            echo "##vso[task.logissue type=warning]BC_VERSION major $BC_MAJOR not in al_tool table — using fallback 16.2.28.57946"
            TOOL="16.2.28.57946"
            ;;
        esac
      fi
      echo "Installing AL compiler $TOOL"
      dotnet tool install -g \
        Microsoft.Dynamics.BusinessCentral.Development.Tools.Linux \
        --version "$TOOL" 2>/dev/null || true
      echo "##vso[task.prependpath]$HOME/.dotnet/tools"
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" end AL_INSTALL
    displayName: 'Install AL compiler'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" begin SYMBOLS "Stage symbols"
      mkdir -p "$(Pipeline.Workspace)/symbols"
      # Manifest-driven resolver: index every artifact .app by its
      # declared id, then stage the transitive dependency closure for
      # the consumer app.json files. This stays stable when Microsoft
      # moves apps between artifact folders across BC versions.
      ARGS=""
      for d in $(APP_DIRS) $(TEST_APP_DIRS); do
        [ -z "$d" ] && continue
        [ -f "$(Pipeline.Workspace)/project/$d/app.json" ] && ARGS="$ARGS --app-json $(Pipeline.Workspace)/project/$d/app.json"
      done
      python3 "$(Agent.BuildDirectory)/bc-runtime/scripts/stage-symbols.py" \
        $ARGS \
        --artifact-dir "$(Pipeline.Workspace)/artifact-cache/$(BC_VERSION)" \
        --out-dir "$(Pipeline.Workspace)/symbols" \
        || true
      echo "Staged $(ls $(Pipeline.Workspace)/symbols/*.app 2>/dev/null | wc -l) symbol files"
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" end SYMBOLS
    displayName: 'Stage symbols from BC artifacts'

  - bash: |
      EFFECTIVE_RUNTIME="$(RUNTIME_VERSION)"
      BC_MAJOR=$(echo "$(BC_VERSION)" | cut -d. -f1)
      if [ -z "$EFFECTIVE_RUNTIME" ]; then
        case "$BC_MAJOR" in
          27) EFFECTIVE_RUNTIME="16.0" ;;
          28) EFFECTIVE_RUNTIME="17.0" ;;
          *)
            echo "##vso[task.logissue type=warning]BC_VERSION major $BC_MAJOR not in runtime table — using fallback 14.0"
            EFFECTIVE_RUNTIME="14.0"
            ;;
        esac
      fi
      echo "Patching app.json runtime → $EFFECTIVE_RUNTIME"
      for d in $(APP_DIRS) $(TEST_APP_DIRS); do
        [ -z "$d" ] && continue
        F="$(Pipeline.Workspace)/project/$d/app.json"
        [ -f "$F" ] || continue
        python3 - "$F" "$EFFECTIVE_RUNTIME" <<'PYEOF'
      import sys, json, pathlib
      p = pathlib.Path(sys.argv[1])
      d = json.loads(p.read_text())
      if d.get("runtime") != sys.argv[2]:
          d["runtime"] = sys.argv[2]
          p.write_text(json.dumps(d, indent=2) + "\n")
          print(f"  patched {p}: runtime → {sys.argv[2]}")
      else:
          print(f"  {p}: runtime already {sys.argv[2]}, skip")
      PYEOF
      done
    displayName: 'Patch app.json runtime'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" begin COMPILE "Compile AL apps"
      SYMBOLS="$(Pipeline.Workspace)/symbols"
      BUILD_DIR="$(Pipeline.Workspace)/build"
      mkdir -p "$BUILD_DIR"

      # ─── Resolve analyzer flags via the helper ──────────────────────
      # Build the helper invocation only when SOMETHING is configured.
      # When nothing is set, ANALYZER_FLAGS stays empty and the compile
      # commands run exactly as they did before this feature existed.
      # resolve-analyzers.py handles Microsoft cop path resolution from
      # the AL tool dir, downloading URL-referenced custom cops, .nupkg
      # auto-extraction (so ALCops.Common.dll comes along automatically),
      # and remote ruleset downloads.
      HELPER_ARGS=()
      [ "$(ENABLE_CODE_COP)" = "true" ] && HELPER_ARGS+=(--enable-code-cop)
      [ "$(ENABLE_UI_COP)" = "true" ] && HELPER_ARGS+=(--enable-ui-cop)
      [ "$(ENABLE_APP_SOURCE_COP)" = "true" ] && HELPER_ARGS+=(--enable-app-source-cop)
      [ "$(ENABLE_PER_TENANT_EXTENSION_COP)" = "true" ] && HELPER_ARGS+=(--enable-per-tenant-extension-cop)
      [ -n "$(CUSTOM_CODE_COPS)" ] && HELPER_ARGS+=(--custom-code-cops "$(CUSTOM_CODE_COPS)")
      [ -n "$(RULESET_FILE)" ] && HELPER_ARGS+=(--ruleset-file "$(RULESET_FILE)")
      [ "$(ENABLE_EXTERNAL_RULESETS)" = "true" ] && HELPER_ARGS+=(--enable-external-rulesets)

      # Run the helper to a tempfile rather than via process substitution.
      # `mapfile -t < <(python3 ...)` SILENTLY SWALLOWS the helper's exit
      # code, so if the helper bails on a missing path the pipeline
      # silently compiles without analyzers and reports a green build.
      # The tempfile pattern lets `if ! ...` see the real exit code.
      # --project-root tells the helper where the consumer checkout
      # lives so non-URL paths get resolved relative to the repo root.
      ANALYZER_FLAGS=()
      if [ ${#HELPER_ARGS[@]} -gt 0 ]; then
        HELPER_OUT=$(mktemp)
        if ! python3 "$(Agent.BuildDirectory)/bc-runtime/scripts/resolve-analyzers.py" \
            --project-root "$(Pipeline.Workspace)/project" \
            "${HELPER_ARGS[@]}" > "$HELPER_OUT"; then
          echo "ERROR: resolve-analyzers.py failed — check stderr above" >&2
          rm -f "$HELPER_OUT"
          exit 1
        fi
        mapfile -t ANALYZER_FLAGS < "$HELPER_OUT"
        rm -f "$HELPER_OUT"
        echo "Analyzer flags: ${ANALYZER_FLAGS[*]}"
      fi

      # ─── Pattern that catches every analyzer load failure mode ─────
      # AL compile reports these as WARNINGS (AD0001 specifically), so
      # without this guard a misconfigured cop would silently disable
      # itself and the pipeline would report a green build with no cops
      # actually enforced. Failing here is the only way you learn your
      # cop wiring is broken.
      ANALYZER_LOAD_FAIL_PATTERN='AD0001|Could not load|BadImageFormatException|PlatformNotSupportedException'

      PP_FLAG=()
      [ -n "$(PREPROCESSOR_SYMBOLS)" ] && PP_FLAG=("/define:$(PREPROCESSOR_SYMBOLS)")

      compile_dir() {
        local src="$1"
        shift
        [ -f "$src/app.json" ] || { echo "skip $src (no app.json)" >&2; return 0; }
        mkdir -p "$src/.alpackages"
        cp "$SYMBOLS"/*.app "$src/.alpackages/" 2>/dev/null || true
        local out="$BUILD_DIR/$(basename "$src").app"
        echo ">>> Compiling $src → $out"
        # Remaining args ($@) are the analyzer flag fragments — may be empty.
        if [ "$#" -gt 0 ]; then
          local tmplog rc
          tmplog=$(mktemp)
          AL compile "/project:$src" "/packagecachepath:$src/.alpackages" "/out:$out" "${PP_FLAG[@]}" "$@" 2>&1 | tee "$tmplog"
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            rm -f "$tmplog"
            return $rc
          fi
          if grep -qE "$ANALYZER_LOAD_FAIL_PATTERN" "$tmplog"; then
            echo "ERROR: analyzer load failure detected in compile output for $src" >&2
            grep -E "$ANALYZER_LOAD_FAIL_PATTERN" "$tmplog" >&2
            rm -f "$tmplog"
            return 1
          fi
          rm -f "$tmplog"
        else
          AL compile "/project:$src" "/packagecachepath:$src/.alpackages" "/out:$out" "${PP_FLAG[@]}"
        fi
      }

      cd "$(Pipeline.Workspace)/project"
      # Production apps always get the analyzer flags (when configured).
      for d in $(APP_DIRS); do
        [ -z "$d" ] && continue
        compile_dir "$d" "${ANALYZER_FLAGS[@]}"
      done
      # Test apps get analyzer flags only when explicitly opted in.
      # Mirrors AL-Go's default of "analyzers don't run on test apps."
      for d in $(TEST_APP_DIRS); do
        [ -z "$d" ] && continue
        mkdir -p "$d/.alpackages"
        cp "$BUILD_DIR"/*.app "$d/.alpackages/" 2>/dev/null || true
        if [ "$(ENABLE_CODE_ANALYZERS_ON_TEST_APPS)" = "true" ]; then
          compile_dir "$d" "${ANALYZER_FLAGS[@]}"
        else
          compile_dir "$d"
        fi
      done
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" end COMPILE
    displayName: 'Compile AL apps (no publish yet)'

  - bash: |
      set -e
      cd "$(Agent.BuildDirectory)/bc-runtime"
      ./scripts/wait-for-bc-healthy.sh 30
      ./scripts/verify-network-surface.sh
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" end BC_BOOT
    displayName: 'Wait for BC healthy'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" begin PUBLISH "Publish AL apps"
      AUTH="$(BC_USERNAME):$(BC_PASSWORD)"
      DEV="http://localhost:7049/BC/dev"
      BUILD_DIR="$(Pipeline.Workspace)/build"
      # shellcheck disable=SC1091
      . "$(Agent.BuildDirectory)/bc-runtime/scripts/publish-app.sh"
      PUBLISHED_COUNT=0
      for d in $(APP_DIRS) $(TEST_APP_DIRS); do
        [ -z "$d" ] && continue
        bc_publish_app "$BUILD_DIR/$(basename "$d").app" "$DEV" "$AUTH" || exit 1
        PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1))
      done
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" count apps_published "$PUBLISHED_COUNT"
      COMPILED_COUNT=$(ls "$BUILD_DIR"/*.app 2>/dev/null | wc -l)
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" count apps_compiled "$COMPILED_COUNT"
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" end PUBLISH
    displayName: 'Publish AL apps to BC'

  - bash: |
      set -e
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" begin TESTS "Run AL tests"
      cd "$(Agent.BuildDirectory)/bc-runtime"
      TESTS_TOTAL=0; TESTS_PASSED=0; TESTS_FAILED=0; CODEUNITS_TOTAL=0
      for d in $(TEST_APP_DIRS); do
        [ -z "$d" ] && continue
        app="$(Pipeline.Workspace)/build/$(basename "$d").app"
        [ -f "$app" ] || { echo "skip: $app (not built)"; continue; }
        base=$(basename "$app")
        echo "=== Running tests in $base ==="
        tmplog=$(mktemp)
        ./scripts/run-tests.sh \
          --app "$app" \
          --auth "$(BC_USERNAME):$(BC_PASSWORD)" \
          --codeunit-range "$(CODEUNIT_RANGE)" \
          --timeout 30 2>&1 | tee "$tmplog"
        line=$(grep -oE 'total=[0-9]+ passed=[0-9]+ failed=[0-9]+|[0-9]+ total, [0-9]+ passed, [0-9]+ failed' "$tmplog" | tail -1 || true)
        if [ -n "$line" ]; then
          if [[ "$line" == total=* ]]; then
            t=$(echo "$line" | sed -n 's/.*total=\([0-9][0-9]*\).*/\1/p')
            p=$(echo "$line" | sed -n 's/.*passed=\([0-9][0-9]*\).*/\1/p')
            f=$(echo "$line" | sed -n 's/.*failed=\([0-9][0-9]*\).*/\1/p')
          else
            t=$(echo "$line" | grep -oE '^[0-9]+')
            p=$(echo "$line" | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+')
            f=$(echo "$line" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+')
          fi
          TESTS_TOTAL=$((TESTS_TOTAL + ${t:-0}))
          TESTS_PASSED=$((TESTS_PASSED + ${p:-0}))
          TESTS_FAILED=$((TESTS_FAILED + ${f:-0}))
        fi
        cu=$(grep -oE 'Test codeunits: [^ ]+' "$tmplog" | head -1 | sed 's/Test codeunits: //')
        if [ -n "$cu" ]; then
          n=$(echo "$cu" | tr ',' '\n' | grep -c .)
          CODEUNITS_TOTAL=$((CODEUNITS_TOTAL + n))
        fi
        rm -f "$tmplog"
      done
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" count tests_total    "$TESTS_TOTAL"
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" count tests_passed   "$TESTS_PASSED"
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" count tests_failed   "$TESTS_FAILED"
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" count codeunits_total "$CODEUNITS_TOTAL"
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" end TESTS
    displayName: 'Run AL tests'

  - bash: |
      JOB_STATUS=success
      [ "$AGENT_JOBSTATUS" = "Failed" ] || [ "$AGENT_JOBSTATUS" = "SucceededWithIssues" ] && JOB_STATUS=failure
      [ "$AGENT_JOBSTATUS" = "Cancelled" ] && JOB_STATUS=cancelled
      export JOB_STATUS
      export BC_TELEMETRY_OPT_OUT="${BC_TELEMETRY_OPT_OUT:-false}"
      bash "$(Agent.BuildDirectory)/bc-runtime/scripts/workflow-summary.sh" emit
    displayName: 'Workflow timing summary + telemetry'
    condition: always()

  - bash: |
      cd "$(Agent.BuildDirectory)/bc-runtime"
      docker compose logs bc | tail -200
    displayName: 'BC logs (on failure)'
    condition: failed()
