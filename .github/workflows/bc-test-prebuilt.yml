name: BC test (prebuilt) [reusable]

# Reusable workflow that publishes pre-built .app files from the calling
# repo to a Business Central container. Test execution is owned by the caller's
# chosen runner against the standard BC container surface.
# No compile step. Use this when you build .app files in a separate workflow,
# commit them to the repo, or get them from a vendor.
#
# Consumer usage (paste into .github/workflows/bc-test.yml in your repo):
#
#   name: BC Tests
#   on: [push, pull_request, workflow_dispatch]
#   jobs:
#     test:
#       uses: jonaswre/MsDyn365Bc.On.Linux/.github/workflows/bc-test-prebuilt.yml@master
#       with:
#         bc_version:     "latest"
#         test_app_files: "tests/MyTests.app"
#
# Inputs are documented under workflow_call below.

on:
  workflow_call:
    inputs:
      bc_version:
        description: "BC platform version (e.g. latest, 28.1, or 28.1.49838.49886)"
        required: false
        type: string
        default: "latest"
      bc_country:
        description: "BC country code (e.g. w1, de, us)"
        required: false
        type: string
        default: "w1"
      bc_type:
        description: "BC artifact type (onprem or sandbox)"
        required: false
        type: string
        default: "onprem"
      bc_username:
        description: "NavUserPassword username for OData/API/Dev/WebClient access"
        required: false
        type: string
        default: "admin"
      bc_password:
        description: "NavUserPassword password for OData/API/Dev/WebClient access"
        required: false
        type: string
        default: "admin"
      app_files:
        description: "Space-separated paths to production .app files (relative to your repo root)"
        required: false
        type: string
        default: ""
      test_app_files:
        description: "Space-separated paths to test .app files (relative to your repo root)"
        required: true
        type: string
      codeunit_range:
        description: "Deprecated compatibility input. This workflow no longer ships a test runner."
        required: false
        type: string
        default: ""
      runner_image:
        description: "Override the bc-runner image (defaults to the public ghcr.io tag)"
        required: false
        type: string
        default: "ghcr.io/jonaswre/msdyn365bc.on.linux/bc-runner:latest"
      runtime_ref:
        description: "Git ref of the Business Central runtime to check out for scripts"
        required: false
        type: string
        default: ""
      bc_linux_ref:
        description: "Deprecated alias for runtime_ref"
        required: false
        type: string
        default: "master"
      timeout_minutes:
        description: "Job timeout"
        required: false
        type: number
        default: 45

    secrets:
      bc_license:
        description: >-
          Optional ISV/developer BC license, base64-encoded.
          When provided, the workflow decodes it to a tempfile in the runner
          workspace, mounts it into the bc-runner + sql containers, and the
          entrypoint imports it BEFORE NST starts — eliminating the legacy
          boot/import/restart cycle that ISVs would otherwise need.
          See README.md "Custom license" section in this repo for
          how to prepare the secret and pass it from the caller workflow.
        required: false

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      BC_RUNNER_IMAGE: ${{ inputs.runner_image }}
      BC_VERSION: ${{ inputs.bc_version }}
      BC_COUNTRY: ${{ inputs.bc_country }}
      BC_TYPE: ${{ inputs.bc_type }}
      BC_USERNAME: ${{ inputs.bc_username }}
      BC_PASSWORD: ${{ inputs.bc_password }}

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout Business Central runtime
        uses: actions/checkout@v4
        with:
          repository: jonaswre/MsDyn365Bc.On.Linux
          ref: ${{ inputs.runtime_ref != '' && inputs.runtime_ref || inputs.bc_linux_ref }}
          path: bc-runtime

      - name: Initialize timing
        run: bash bc-runtime/scripts/workflow-summary.sh init

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # Artifact download + docker pull in parallel (independent network IO).
      - name: Download BC artifacts + pull docker images (parallel)
        env:
          BC_RUNNER_IMAGE: ${{ inputs.runner_image }}
          BC_ARTIFACTS_DIR: ${{ github.workspace }}/artifact-cache/${{ inputs.bc_version }}
        run: |
          set -e
          bash bc-runtime/scripts/workflow-summary.sh begin DOWNLOAD "Download BC artifacts + pull docker images"
          mkdir -p "artifact-cache/$BC_VERSION"
          (
            bc-runtime/scripts/download-artifacts.sh \
              "$BC_TYPE" "$BC_VERSION" "$BC_COUNTRY" \
              "$PWD/artifact-cache/$BC_VERSION"
          ) &
          ARTIFACT_PID=$!
          (
            cd bc-runtime
            for attempt in 1 2 3 4 5; do
              if docker compose pull --quiet; then break; fi
              echo "docker compose pull failed (attempt $attempt/5); retrying in 15s..."
              sleep 15
            done
          ) &
          PULL_PID=$!
          wait $ARTIFACT_PID || { echo "artifact download failed"; exit 1; }
          wait $PULL_PID     || { echo "docker pull failed"; exit 1; }
          bash bc-runtime/scripts/workflow-summary.sh end DOWNLOAD

      - name: Resolve apps to keep in BC database
        env:
          APP_FILES: ${{ inputs.app_files }}
          TEST_APP_FILES: ${{ inputs.test_app_files }}
        run: |
          bash bc-runtime/scripts/workflow-summary.sh begin RESOLVE "Resolve apps to keep"
          # Walk the consumer's .app files (not source dirs), then keep the
          # 5-app baseline + the full transitive closure.
          ARGS=""
          for f in $APP_FILES $TEST_APP_FILES; do
            [ -z "$f" ] && continue
            if [ -f "project/$f" ]; then
              ARGS="$ARGS --app-file project/$f"
            fi
          done
          KEEP_IDS=$(python3 bc-runtime/scripts/resolve-keep-app-ids.py \
            $ARGS \
            --artifact-dir "artifact-cache/$BC_VERSION")
          echo "Resolved keep set: $KEEP_IDS"
          echo "BC_CLEAR_ALL_APPS=selective" >> "$GITHUB_ENV"
          echo "BC_KEEP_APP_IDS=$KEEP_IDS" >> "$GITHUB_ENV"
          bash bc-runtime/scripts/workflow-summary.sh end RESOLVE

      # Stage the optional ISV license. When the consumer passed `bc_license`
      # in the secrets: block, decode the base64 blob to a tempfile and export
      # the env vars that wire it into the docker-compose mounts. The
      # entrypoint will then import this license INSTEAD of the default
      # Cronus.bclicense, before NST starts — no boot/import/restart cycle.
      # No `if: secrets.bc_license != ''` — the `secrets` context isn't
      # allowed in step `if:` expressions (rejected by GitHub at parse time).
      # Step always runs, body skips itself when the env var is empty.
      - name: Stage ISV license (if provided)
        env:
          BC_LICENSE_B64: ${{ secrets.bc_license }}
        run: |
          set -e
          if [ -z "${BC_LICENSE_B64:-}" ]; then
            echo "No bc_license secret provided — using default Cronus license"
            exit 0
          fi
          LICENSE_PATH="$RUNNER_TEMP/bc-license.bclicense"
          printf '%s' "$BC_LICENSE_B64" | base64 -d > "$LICENSE_PATH"
          if [ ! -s "$LICENSE_PATH" ]; then
            echo "ERROR: bc_license secret decoded to an empty file"
            exit 1
          fi
          chmod 644 "$LICENSE_PATH"
          echo "BC_LICENSE_HOST_PATH=$LICENSE_PATH" >> "$GITHUB_ENV"
          echo "BC_LICENSE_FILE=/bc/custom-license.bclicense" >> "$GITHUB_ENV"
          echo "ISV license staged for entrypoint import"

      # No compile in prebuilt mode, so there's nothing CPU-bound to overlap
      # with BC startup — but we still kick off in the background to allow
      # the eventual workflow-summary phase tracking to be cleaner.
      - name: Start Business Central container (background)
        env:
          BC_ARTIFACTS_DIR: ${{ github.workspace }}/artifact-cache/${{ inputs.bc_version }}
        working-directory: bc-runtime
        run: |
          bash scripts/workflow-summary.sh begin BC_BOOT "BC startup (background → wait for healthy)"
          docker compose up -d
          echo "BC container started in background — continuing with other work."

      - name: Wait for BC healthy
        working-directory: bc-runtime
        run: |
          ./scripts/wait-for-bc-healthy.sh 30
          ./scripts/verify-network-surface.sh
          bash scripts/workflow-summary.sh end BC_BOOT

      - name: Publish .app files
        env:
          AUTH: "${{ inputs.bc_username }}:${{ inputs.bc_password }}"
          DEV: "http://localhost:7049/BC/dev"
          APP_FILES: ${{ inputs.app_files }}
          TEST_APP_FILES: ${{ inputs.test_app_files }}
        run: |
          set -e
          bash bc-runtime/scripts/workflow-summary.sh begin PUBLISH "Publish .app files"
          # Source the canonical publish helper. Previously this step had
          # its own inline publish_app that treated EVERY 422 as success
          # and silently swallowed missing-dependency / schema-sync errors,
          # letting downstream test runs produce "0 total, 0 passed,
          # 0 failed" with no clue why. bc_publish_app reads the response
          # body and only treats 422 as success when it actually says
          # "already". See the bc-copilot-blueprint debugging session
          # for the full story.
          # shellcheck disable=SC1091
          . bc-runtime/scripts/publish-app.sh
          PUBLISHED_COUNT=0
          for app in $APP_FILES; do
            [ -z "$app" ] && continue
            full="project/$app"
            [ -f "$full" ] || { echo "missing: $full"; exit 1; }
            echo ">>> Publishing $full"
            bc_publish_app "$full" "$DEV" "$AUTH" || exit 1
            PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1))
          done
          for app in $TEST_APP_FILES; do
            [ -z "$app" ] && continue
            full="project/$app"
            [ -f "$full" ] || { echo "missing: $full"; exit 1; }
            echo ">>> Publishing $full"
            bc_publish_app "$full" "$DEV" "$AUTH" || exit 1
            PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1))
          done
          bash bc-runtime/scripts/workflow-summary.sh count apps_published "$PUBLISHED_COUNT"
          bash bc-runtime/scripts/workflow-summary.sh end PUBLISH

      - name: Test execution notice
        run: |
          echo "MsDyn365Bc.On.Linux no longer ships a host-side test runner."
          echo "Use the published BC container endpoints with the runner owned by your project."

      - name: Workflow timing summary + telemetry
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          BC_TELEMETRY_OPT_OUT: ${{ vars.BC_TELEMETRY_OPT_OUT || 'false' }}
        run: bash bc-runtime/scripts/workflow-summary.sh emit

      - name: BC logs (on failure)
        if: failure()
        working-directory: bc-runtime
        run: docker compose logs bc | tail -200
