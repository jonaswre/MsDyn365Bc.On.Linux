name: Test BC Versions

# Matrix-tests every supported BC version end-to-end against a real
# test extension (extensions/smoke-test/) by reusing the canonical
# bc-test-from-source.yml workflow. There used to be ~150 lines of
# inline compile/publish/test logic in this file that duplicated
# (and silently broke) features the reusable workflow already provides:
#  - start-do-wait parallelism (BC boots while AL compile runs)
#  - 422-body-inspecting publish helper
#  - shared wait-for-bc-healthy script
#  - hard fail when TESTS_TOTAL is 0
# After the bc-copilot-blueprint debugging session uncovered all of those,
# the cleanest fix was to just use the reusable workflow here too.

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'BC 28 versions to test (comma-separated, e.g. "28.1,28.2")'
        required: false
        default: '28.0,28.1,28.2'
        type: string
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Needed to push the SHA image on branch builds and pull images in test jobs.
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      alcops_url: ${{ steps.alcops.outputs.url }}
    steps:
    - id: set
      run: |
        VERSIONS='${{ inputs.versions }}'
        if [ -z "$VERSIONS" ]; then
          # Default matrix when triggered by push/PR (no workflow_dispatch input).
          # Keep in sync with the workflow_dispatch input default above.
          VERSIONS="28.0,28.1,28.2"
        fi
        export VERSIONS
        python3 - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import os
        import re
        import sys

        versions = [item.strip() for item in os.environ["VERSIONS"].split(",") if item.strip()]
        invalid = [version for version in versions if not re.fullmatch(r"[0-9]+(?:\.[0-9]+){1,3}|latest", version)]
        unsupported = [version for version in versions if version != "latest" and not version.startswith("28.")]
        if not versions:
            print("No BC versions provided. Use comma-separated BC 28 values like 28.1,28.2.", file=sys.stderr)
            sys.exit(1)
        if invalid:
            print(f"Invalid BC version(s): {', '.join(invalid)}. Expected BC 28 values like 28.1,28.2 or latest.", file=sys.stderr)
            sys.exit(1)
        if unsupported:
            print(f"Unsupported BC version(s): {', '.join(unsupported)}. This workflow supports BC 28 only.", file=sys.stderr)
            sys.exit(1)
        print("matrix=" + json.dumps({"bc_version": versions}))
        PY

    - id: alcops
      # Resolve the latest ALCops.Analyzers nupkg URL via the GitHub API.
      # ALCops bakes the version into the asset filename, so the static
      # /releases/latest/download/<file> redirect doesn't work for them
      # — we have to read the release JSON. This intentionally pulls
      # 'latest' on every run so the matrix catches any regression
      # introduced by an ALCops release that breaks Linux .NET 8 loading.
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        URL=$(gh api repos/ALCops/Analyzers/releases/latest \
          --jq '.assets[] | select(.name | endswith(".nupkg")) | .browser_download_url' \
          | head -1)
        if [ -z "$URL" ]; then
          echo "ERROR: could not resolve latest ALCops nupkg URL" >&2
          exit 1
        fi
        echo "Resolved latest ALCops: $URL"
        echo "url=$URL" >> $GITHUB_OUTPUT

  build-image:
    # Build the bc-runner image from THIS commit as a compile/smoke check,
    # then push a SHA tag for branch builds. Pull requests still build without
    # pushing and consume the current latest image for runtime execution.
    runs-on: ubuntu-latest
    outputs:
      runner_image: ${{ steps.select-image.outputs.runner_image }}
    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push SHA image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: src/Dockerfile
        push: true
        tags: ${{ env.IMAGE }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - id: select-image
      name: Select runner image reference
      run: echo "runner_image=${{ env.IMAGE }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  # ─── Matrix validation: each BC version runs through the canonical
  #     reusable workflow with the smoke test extension. The reusable workflow
  #     handles BC startup parallelism, AL compile, and publish with
  #     422-body-checking.
  test:
    needs: [prepare, build-image]
    name: BC ${{ matrix.bc_version }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/bc-test-from-source.yml
    with:
      bc_version: ${{ matrix.bc_version }}
      bc_country: w1
      bc_type: onprem
      test_app_dirs: extensions/smoke-test
      # Use the selected repository tag from build-image (latest) because
      # test-versions does not publish images.
      runner_image: ${{ needs.build-image.outputs.runner_image }}
      # Pin the runtime scripts checkout to this commit too, so validation
      # at SHA X uses entrypoint.sh / publish-app.sh /
      # wait-for-bc-healthy.sh from SHA X. Without this we'd test the
      # SHA X image with master scripts.
      runtime_ref: ${{ github.sha }}
      # ─── Analyzer load validation ───────────────────────────────────────
      # Every matrix leg compiles the smoke test with all four Microsoft cops
      # PLUS the latest ALCops nupkg PLUS a JSON ruleset that includes
      # StefanMaron/RulesetFiles/base.rulset.json as a remote include. The
      # reusable workflow's compile step greps the AL compiler output for
      # AD0001 / "Could not load" / BadImageFormatException /
      # PlatformNotSupportedException and fails the job if any of those
      # appear — catches "cop DLL silently failed to load on a new BC
      # version" regressions immediately, across the whole support matrix.
      # extensions/smoke-test/cops.rulset.json is runtime-internal and
      # NOT shipped to consumers via the template — they bring their own
      # ruleset and customCodeCops via the workflow inputs.
      enable_code_cop: true
      enable_ui_cop: true
      enable_app_source_cop: true
      enable_per_tenant_extension_cop: true
      custom_code_cops: ${{ needs.prepare.outputs.alcops_url }}
      ruleset_file: "extensions/smoke-test/cops.rulset.json"
      enable_external_rulesets: true
      # Exercise preprocessor_symbols end-to-end on every matrix leg.
      # The smoke test has no #if guards so the symbol is a no-op at the AL
      # level, but it exercises the flag wiring through the workflow and alc.
      preprocessor_symbols: "SMOKE"

  # Exercises the container's own artifact download path (no pre-cached
  # artifacts) and the no-test-toolkit startup mode in one BC startup.
  # Doesn't fit the reusable workflow pattern because the reusable workflow
  # always pre-downloads artifacts on the host.
  test-container-download:
    needs: [build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Container download without test toolkit (BC 28.2)

    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Start BC with in-container artifact download and no test toolkit
      # BC_ARTIFACTS_DIR is intentionally NOT set so docker-compose uses a named
      # volume (bc-artifacts) which starts empty — forcing the entrypoint to
      # download artifacts itself. This validates the container download feature.
      env:
        BC_VERSION: "28.2"
        BC_INCLUDE_TEST_TOOLKIT: "false"
        BC_RUNNER_IMAGE: ${{ needs.build-image.outputs.runner_image }}
      run: |
        STEP_START=$(date +%s)
        docker compose up -d 2>&1 | tail -10
        # Use the shared healthcheck script. 30-min budget covers the
        # in-container artifact download (~3 min) + BC boot (~3-5 min).
        ./scripts/wait-for-bc-healthy.sh 30
        ./scripts/verify-network-surface.sh
        docker compose logs bc 2>&1 \
          | grep -q "BC_INCLUDE_TEST_TOOLKIT=false: skipped test toolkit publishing"
        echo "TOTAL_DURATION=$(($(date +%s) - STEP_START))" >> $GITHUB_ENV

    - name: Download timing summary
      if: always()
      run: |
        echo "=== In-container artifact download timing ==="
        docker compose logs bc 2>&1 | grep "\[artifacts\]"
        echo ""
        echo "Total start time (download + DB restore + BC startup): ${TOTAL_DURATION:-n/a}s"

  test-webclient:
    needs: [build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Web client opt-in (BC 28.2)

    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Start BC with web client
      env:
        BC_VERSION: "28.2"
        BC_WEBCLIENT: "1"
        BC_RUNNER_IMAGE: ${{ needs.build-image.outputs.runner_image }}
      run: |
        docker compose up -d 2>&1 | tail -10
        ./scripts/wait-for-bc-healthy.sh 30
        ./scripts/verify-network-surface.sh
        docker compose logs bc 2>&1 \
          | grep -q "BC_WEBCLIENT=1: starting web client"
        status=$(curl -sS --max-time 10 -o /dev/null -w '%{http_code}' http://localhost:8080 || true)
        case "$status" in
          2*|3*|4*) echo "web client responded with HTTP $status" ;;
          *) echo "ERROR: web client returned HTTP ${status:-000}"; exit 1 ;;
        esac

    - name: BC logs
      if: failure()
      run: docker compose logs bc 2>&1 | tail -200

  # Exercises the macOS compose overlay (docker-compose.macos.yml) on a
  # Linux runner. GitHub-hosted macOS runners cannot run containers at
  # all — Apple's Virtualization framework forbids nested virtualization
  # on the M1/M2 hardware GitHub uses — so the podman/Rosetta side of
  # MacOS.md is untestable in hosted CI. This leg verifies everything
  # else the overlay changes: the 2022-CU17 image tag still exists on
  # MCR, SQL Server boots and restores the demo DB while running as
  # root (user 0:0), and BC comes up healthy on top of that SQL.
  # COMPOSE_FILE makes every docker compose invocation (including the
  # shared wait-for-bc-healthy.sh) apply the overlay consistently.
  test-macos-overlay:
    needs: [build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: macOS overlay test (BC 28.2)
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.macos.yml

    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Validate compose files merge
      run: |
        # Catches YAML/merge errors in the overlay without booting anything,
        # and proves the overlay actually overrides what it claims to.
        MERGED=$(docker compose config)
        echo "$MERGED" | grep -q "mssql/server:2022-CU17-ubuntu-22.04" \
          || { echo "ERROR: overlay did not apply the CU17 SQL image pin"; exit 1; }
        echo "$MERGED" | grep -q 'user: "0:0"' \
          || { echo "ERROR: overlay did not apply user 0:0 on the sql service"; exit 1; }

    - name: Start BC with macOS overlay
      env:
        BC_VERSION: "28.2"
        BC_RUNNER_IMAGE: ${{ needs.build-image.outputs.runner_image }}
      run: |
        docker compose up -d 2>&1 | tail -10
        ./scripts/wait-for-bc-healthy.sh 30

    - name: Verify overlay applied to running stack
      run: |
        SQL_CID=$(docker compose ps -q sql)
        SQL_IMAGE=$(docker inspect --format '{{.Config.Image}}' "$SQL_CID")
        SQL_UID=$(docker compose exec -T sql id -u)
        echo "sql image: $SQL_IMAGE, uid: $SQL_UID"
        [ "$SQL_IMAGE" = "mcr.microsoft.com/mssql/server:2022-CU17-ubuntu-22.04" ] \
          || { echo "ERROR: sql container is not running the CU17 image"; exit 1; }
        [ "$SQL_UID" = "0" ] \
          || { echo "ERROR: sql container is not running as root"; exit 1; }

    - name: SQL log excerpt
      if: failure()
      run: docker compose logs sql 2>&1 | tail -50

  # Uses Microsoft's official AL development tool as an external bench against
  # the Linux container. This validates that the standard CI-facing tool can
  # compile a workspace, publish the resulting app, and execute AL tests
  # against the container's dev endpoint without any custom runner or
  # in-container helper.
  test-official-altool:
    needs: [build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    name: Official AL tool bench (BC 28.2)

    steps:
    - uses: actions/checkout@v4

    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "8.0.x"

    - name: Install official AL development tool
      run: |
        dotnet tool install -g Microsoft.Dynamics.BusinessCentral.Development.Tools \
          --version "18.0.37.11445-beta" \
        || dotnet tool update -g Microsoft.Dynamics.BusinessCentral.Development.Tools \
          --version "18.0.37.11445-beta"
        echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
        export PATH="$HOME/.dotnet/tools:$PATH"
        al --version
        al --help
        al workspace compile --help
        al publishapp --help
        al runtests --help
        ALTOOL_DLL=$(find "$HOME/.dotnet" "$HOME/.nuget" \
          -path "*/microsoft.dynamics.businesscentral.development.tools/18.0.37.11445-beta/*/altool.dll" \
          -type f 2>/dev/null | sort | tail -1)
        if [ -z "$ALTOOL_DLL" ]; then
          echo "ERROR: could not locate altool.dll in the official package"
          exit 1
        fi
        echo "ALTOOL_DLL=$ALTOOL_DLL" >> "$GITHUB_ENV"
        dotnet "$ALTOOL_DLL" --version
        AL_TOOL_DIR=$(dirname "$ALTOOL_DLL")
        echo "AL_TOOL_DIR=$AL_TOOL_DIR" >> "$GITHUB_ENV"
        OFFICIAL_AL_BIN="$RUNNER_TEMP/official-altool-bin"
        mkdir -p "$OFFICIAL_AL_BIN"
        cat > "$OFFICIAL_AL_BIN/alc" <<SH
        #!/usr/bin/env bash
        exec dotnet "$AL_TOOL_DIR/alc.dll" "\$@"
        SH
        chmod +x "$OFFICIAL_AL_BIN/alc"
        echo "$OFFICIAL_AL_BIN" >> "$GITHUB_PATH"
        echo "OFFICIAL_AL_BIN=$OFFICIAL_AL_BIN" >> "$GITHUB_ENV"
        PATH="$OFFICIAL_AL_BIN:$PATH" alc /? | head -5

    - name: Download artifacts, stage symbols, and start BC
      env:
        BC_VERSION: "28.2"
        BC_COUNTRY: "w1"
        BC_TYPE: "onprem"
        BC_RUNNER_IMAGE: ${{ needs.build-image.outputs.runner_image }}
        BC_INCLUDE_TEST_TOOLKIT: "false"
        BC_ARTIFACTS_DIR: ${{ github.workspace }}/artifact-cache/28.2
      run: |
        set -e
        mkdir -p "$BC_ARTIFACTS_DIR" official-symbols
        (
          ./scripts/download-artifacts.sh "$BC_TYPE" "$BC_VERSION" "$BC_COUNTRY" "$BC_ARTIFACTS_DIR"
        ) &
        ARTIFACT_PID=$!
        (
          for attempt in 1 2 3 4 5; do
            if docker compose pull --quiet; then break; fi
            echo "docker compose pull failed (attempt $attempt/5); retrying in 15s..."
            sleep 15
          done
        ) &
        PULL_PID=$!
        wait $ARTIFACT_PID || { echo "artifact download failed"; exit 1; }
        wait $PULL_PID     || { echo "docker pull failed"; exit 1; }

        PLATFORM_VERSION=$(python3 -c "import json; print(json.load(open('$BC_ARTIFACTS_DIR/app/manifest.json'))['platform'])")
        PLATFORM_MAJOR_MINOR=$(echo "$PLATFORM_VERSION" | cut -d. -f1,2)
        RUNTIME_VERSION=$(dotnet "$ALTOOL_DLL" GetLatestSupportedRuntimeVersion "$PLATFORM_MAJOR_MINOR" | tr -d '\r\n')
        echo "Official AL tool selected runtime $RUNTIME_VERSION for platform $PLATFORM_MAJOR_MINOR"
        python3 - extensions/minimal-test/app.json "$RUNTIME_VERSION" <<'PY'
        import json
        import pathlib
        import sys

        path = pathlib.Path(sys.argv[1])
        runtime = sys.argv[2]
        data = json.loads(path.read_text(encoding="utf-8"))
        data["runtime"] = runtime
        path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
        PY

        python3 scripts/stage-symbols.py \
          --app-json extensions/minimal-test/app.json \
          --artifact-dir "$BC_ARTIFACTS_DIR" \
          --out-dir official-symbols
        cat > official-altool-smoke.code-workspace <<'JSON'
        {
          "folders": [
            {
              "name": "Minimal Test",
              "path": "extensions/minimal-test"
            }
          ]
        }
        JSON

        docker compose up -d 2>&1 | tail -10

    - name: Seed official AL tool UserPassword cache
      env:
        BC_SERVER_USERNAME: admin
        BC_SERVER_PASSWORD: admin
      run: |
        set -e
        SEED_DIR="$RUNNER_TEMP/altool-userpassword-cache"
        mkdir -p "$SEED_DIR"
        cat > "$SEED_DIR/SeedAlToolUserPasswordCache.csproj" <<'XML'
        <Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <OutputType>Exe</OutputType>
            <TargetFramework>net8.0</TargetFramework>
            <ImplicitUsings>enable</ImplicitUsings>
            <Nullable>enable</Nullable>
          </PropertyGroup>
          <ItemGroup>
            <FrameworkReference Include="Microsoft.AspNetCore.App" />
          </ItemGroup>
        </Project>
        XML
        cat > "$SEED_DIR/Program.cs" <<'CS'
        using System.Reflection;
        using System.Text;
        using System.Text.Json;
        using Microsoft.AspNetCore.DataProtection;

        var toolDir = args[0];
        var altoolDll = args[1];
        var server = args[2];
        var serverInstance = args[3];
        var username = args[4];
        var password = args[5];

        var key = $"{server.ToLowerInvariant()}_{serverInstance.ToLowerInvariant()}";
        var cache = new Dictionary<string, UsernamePassword>
        {
            [key] = new(username, password),
        };
        var json = JsonSerializer.Serialize(cache);
        var appData = Environment.GetFolderPath(Environment.SpecialFolder.ApplicationData);
        var altoolAssemblyName = AssemblyName.GetAssemblyName(altoolDll).FullName
            ?? throw new InvalidOperationException("Could not read altool assembly name.");
        var protectorDirectory = Path.Combine(appData, altoolAssemblyName);
        Directory.CreateDirectory(protectorDirectory);
        var provider = DataProtectionProvider.Create(new DirectoryInfo(protectorDirectory));
        var purpose = Uri.EscapeDataString("Microsoft.Dynamics.BusinessCentral.EditorService.Data");
        var protectedPayload = provider.CreateProtector(purpose).Protect(Encoding.UTF8.GetBytes(json));
        var cachePath = Path.Combine(toolDir, "UserPasswordCache.dat");
        File.WriteAllBytes(cachePath, protectedPayload);
        Console.WriteLine($"Seeded {cachePath} for {key}");

        internal sealed record UsernamePassword(string Username, string Password);
        CS
        dotnet run --project "$SEED_DIR" -- \
          "$AL_TOOL_DIR" \
          "$ALTOOL_DLL" \
          "http://localhost" \
          "BC" \
          "$BC_SERVER_USERNAME" \
          "$BC_SERVER_PASSWORD"

    - name: Compile and publish with official AL tool
      env:
        BC_SERVER_USERNAME: admin
        BC_SERVER_PASSWORD: admin
        COLUMNS: 120
        TERM: xterm
      run: |
        set -eo pipefail
        mkdir -p official-build official-logs
        dotnet "$ALTOOL_DLL" workspace compile official-altool-smoke.code-workspace \
          --packagecachepath "$(pwd)/official-symbols" \
          --outfolder "$(pwd)/official-build" \
          --maxcpucount 1 \
          --define OFFICIAL_AL_TOOL_BENCH \
          --logdirectory "$(pwd)/official-logs"

        APP=$(find official-build -type f -name '*.app' | sort | head -1)
        if [ -z "$APP" ]; then
          echo "ERROR: official AL tool did not produce an app package"
          find official-build -maxdepth 3 -type f -print
          exit 1
        fi
        echo "Official AL tool built: $APP"
        dotnet "$ALTOOL_DLL" GetPackageManifest "$APP"

        ./scripts/wait-for-bc-healthy.sh 30
        ./scripts/verify-network-surface.sh
        dotnet "$ALTOOL_DLL" publishapp "$APP" \
          --server "http://localhost" \
          --serverInstance "BC" \
          --port 7049 \
          --environmentType "OnPrem" \
          --authentication "UserPassword" \
          --schemaUpdateMode "ForceSync"
        dotnet "$ALTOOL_DLL" runtests 99800 \
          --server "http://localhost" \
          --serverinstance "BC" \
          --port 7049 \
          --environmenttype "OnPrem" \
          --authentication "UserPassword" \
          | tee official-test-results.log
        grep -q "Test run completed: 3 passed, 0 failed, 0 skipped." official-test-results.log
        grep -q "PASS AdditionWorks" official-test-results.log
        grep -q "PASS MultiplicationWorks" official-test-results.log

    - name: Official AL tool bench diagnostics
      if: failure()
      run: |
        echo "=== official AL tool logs ==="
        find official-logs -type f -maxdepth 2 -print -exec sed -n '1,160p' {} \; || true
        echo "=== official AL tool test results ==="
        cat official-test-results.log || true
        echo "=== BC logs ==="
        docker compose logs bc 2>&1 | tail -200 || true

  publish-latest:
    needs: [test, test-container-download, test-webclient, test-macos-overlay, test-official-altool]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
    - name: Set lowercase image name
      run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/bc-runner" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Promote validated SHA image to latest
      run: |
        docker buildx imagetools create \
          -t "${IMAGE}:latest" \
          "${IMAGE}:${{ github.sha }}"
